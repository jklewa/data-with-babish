babish_id: recipe-0575
name: Tortilla Chips
image_link: ''
raw_ingredient_list: 'Corn tortillas

  1 gallon canola oil

  Kosher salt'
raw_procedure: 'Carefully cut the corn tortillas into tortilla chip shapes.

  Dry the tortillas in a 200°F oven for about 10 minutes. After 5 minutes has passed, take the tortillas out of the oven and flip each tortilla for maximum dryness. Alternatively, let the tortillas sit out out overnight until they are thoroughly stale.

  Once dry, place the chips into one gallon of canola oil at 350°F on the stovetop for 1 to 2 minutes. The chips will continue to darken after cooking. While the chips are still hot, season them with kosher salt. Repeat this step with the remaining tortillas. Then, drain the chips on paper towel lined baking sheets.'
