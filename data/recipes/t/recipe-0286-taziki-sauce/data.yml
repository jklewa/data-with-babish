name: Taziki Sauce
image_link: null
raw_ingredient_list: '1 cup of greek yogurt

  1 cucumber, seeded

  2 cloves of garlic

  Juice of one lemon

  ¼ cup finely minced dill

  Salt

  Pepper'
raw_procedure: In a medium bowl, whisk together the yogurt, chopped cucumber, minced garlic, juice of one lemon, and dill. Season with salt and pepper. Chill.
