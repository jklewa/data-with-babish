babish_id: recipe-0516
name: Tosi-Inspired Peanut Butter Cookies
image_link: null
raw_ingredient_list: '50 grams glucose

  225 grams bread flour

  2 grams baking powder

  1 gram baking soda

  9 grams kosher salt

  1 ½ sticks unsalted butter (room temperature)

  300 grams granulated sugar

  260 grams creamy peanut butter

  2 large eggs

  ½ gram vanilla extract

  4-6 ounces high-quality dark chocolate or chocolate chips'
raw_procedure: 'Combine 50 grams of glucose, 225 grams of bread flour, 2 grams of baking powder, 1 gram of baking soda, and 9 grams of kosher salt. Whisk dry ingredients together and set aside.

  Place 1 ½ sticks of unsalted butter (room temperature), 300 grams of granulated sugar, and 50 grams of glucose syrup. If you are unable to access glucose syrup, you can use light corn syrup, but it will not have the same consistency in the end.

  Beat this mixture together with a stand-up mixer on medium-high speed for 2-3 minutes or until the texture is light and fluffy.

  Scrape down the sides of the bowl and add 260 grams of creamy peanut butter and beat on medium-high speed for 30 seconds or until combined.

  With the mixer running on slow, add 2 large eggs one at a time until being combined for about 30 seconds.

  Add ½ gram of vanilla extract before beating on high-speed for 3 minutes until the mixture is light, creamy, and doubled in volume.

  Add your pre-combined dry ingredients after scraping down the bowl one more time. Mix minimally on low-speed for about 30 seconds.

  Caramelize some granulated sugar over medium-low heat until amber in color. Pour it on parchment paper and allow to cool completely before peeling away from the parchment and smashing into tiny bits. None of the bits should be larger than a grain of rice. Dump into the cookie dough mixture.

  Chop up about 4-6 ounces of high quality dark chocolate and add to the mixture. Slowly and gently mix together to evenly incorporate the mix-ins.

  Use a tiny ice cream scoop or melon baller to scoop out uniform little nubbins (2-3 tablespoons worth) of the cookie dough. Space out your scoops evenly on a parchment lined baking sheet.

  Pat down the tops of the scoops a little bit to make the scoops into evenly proportioned chubby little disks.

  Stack and wrap the cookie dough in plastic wrap and let sit in the fridge for as little as three hours and as much as three days. The longer you let the cookie dough sit, the better it is going to look and taste.

  Once finished chilling, unwrap and place in a 375°F oven for 15-18 minutes until they are golden brown and crisp.'
