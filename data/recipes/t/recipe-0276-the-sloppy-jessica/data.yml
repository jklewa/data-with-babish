name: The Sloppy Jessica
image_link: null
raw_ingredient_list: 'Chili

  Red Sauce

  Mac and Cheese

  Mozzarella cheese

  French bread'
raw_procedure: 'Cut french bread in half lengthwise. Add mozzarella cheese on both halves, topped with the red sauce, more mozzarella and some grated parmesan.

  Place in a 425°F oven until cheese is melted.

  Combine your mac and cheese with your chili and mix together to make chili mac.

  Remove french bread from oven and top with chili mac mixture.

  Fold bread in half to make sandwich. Cut in half. Serve and enjoy!'
