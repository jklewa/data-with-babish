babish_id: recipe-0106
name: Tomato Soup with Grilled Cheese Croutons
image_link: null
raw_ingredient_list: '1 shallot, finely minced

  1 clove garlic, finely minced

  2 Tbsp unsalted buter

  1 Tbsp tomato paste

  Dash of oregano

  1 28oz can of San Marzano tomatoes

  1 cup water

  1 tsp molasses

  1 slice white bread, crust removed

  Olive oil

  Sugar, to taste

  Kosher salt, to taste

  Heavy cream (if desired)

  Mayonnaise (to coat outer sides of bread)

  Sliced bread of choice

  American cheese

  1 Tbsp butter to grease the pan'
raw_procedure: 'Finely mince a shallot and one clove of garlic. In a pan add 2 Tbsp of butter and melt over medium high heat before adding the minced shallot. Saute for about 3 minutes before adding garlic and then saute that for about 1 minute. Add 1 Tbsp of tomato paste and saute for 30 seconds.

  Add a shake of oregano and 1 can of whole San Marzano tomatoes. Break the tomatoes up with a wooden spoon and then add 1 cup of water along with 1 tsp of molasses. Bring to a simmer and mix to combine. Let simmer for 30-60 minutes and then add the mixture to a blender.

  To add to the creaminess of the soup, add 1 piece of torn crustless white bread to the blender and blend on high. As it blends, add olive oil to emulsify the soup. Next add sugar, kosher salt, and more olive oil as necessary until the desired texture and consistency is reached.

  For the grilled cheese, use mayonnaise on the bread instead of butter along with 2 slices of american cheese. Cook in a pan with melted butter until both sides are nicely golden brown. Remove from pan and cut off crust. Cut the grilled cheese into small crouton-sized pieces.

  Add the tomato soup to a bowl along with some heavy cream drizzle and grilled cheese croutons.

  Serve and enjoy.'
