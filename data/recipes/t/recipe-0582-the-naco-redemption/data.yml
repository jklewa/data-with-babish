babish_id: recipe-0582
name: The Naco Redemption
image_link: ''
raw_ingredient_list: '8 ounces sharp cheddar cheese, grated

  1 Tbsp corn starch

  1 cup evaporated milk

  ½ cup pickled jalapeno brine

  Tortilla chips

  Tortilla

  Taco beef'
raw_procedure: 'In a separate bowl, combine 8 ounces of hand-shredded sharp cheddar cheese with 1 tablespoon of corn starch.

  Then, to a small saucepan, add 1 cup of evaporated milk and ½ cup of pickled jalapeño brine. Stir constantly over medium heat until the cheese is melted and starts to resemble a thick nacho cheese. It may look a bit lumpy at first, but just keep stirring and it will eventually smooth out. Note that the cheese will coagulate quickly, so move as fast as possible.

  Place a few broken tortilla chips on top of a tortilla. Cover the broken chips with cheese sauce, taco beef, and more cheese sauce.'
