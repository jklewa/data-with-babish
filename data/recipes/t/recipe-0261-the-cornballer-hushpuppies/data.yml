babish_id: recipe-0261
name: The Cornballer (Hushpuppies)
image_link: null
raw_ingredient_list: '120g corn flour

  85g all purpose flour

  1 ½ tsp baking powder

  ½ tsp baking soda

  1 tsp kosher salt

  ½ tsp paprika

  ¾ cup buttermilk

  2 whole eggs

  1 jalapeno, chopped

  1 scallion, chopped

  1 cup of whole corn'
raw_procedure: 'In a bowl, combine 120g of corn flour, 85g of all purpose flour, 1 ½ tsp baking powder, ½ tsp baking soda, 1 tsp kosher salt, and ½ tsp paprika. Whisk to combine.

  In a separate bowl, combine ¾ cup of buttermilk and 2 whole eggs. Whisk to combine.

  Pour the buttermilk and eggs into the dry mixture and SLOWLY whisk to combine until it’s a pancake batter consistency. It can be lumpy. Let sit for 10 minutes.

  Next add 1 chopped jalapeno, 1 chopped scallion, and 1 cup of whole corn. You don’t have to use these ingredients, you can use whatever you’d like as fillers. Fold in to combine.

  Using a small ice cream or cookie dough scoop, scoop out batter and place in a fryer that has oil heated to 375°.

  Fry for a few minutes - until golden, puffy, and crispy.

  Serve with tartar sauce and enjoy!'
