name: Taco Town 15-Flavor Taco
image_link: null
raw_ingredient_list: 'Crepe Batter

  Blueberry Pancake

  Pico de Gallo

  Beer Batter

  Southwestern Sauce

  Guacamolito

  2 ounces ground beef

  2 tsp taco seasoning

  1 hard shell taco

  1 ounce shredded lettuce

  1 ounce chopped tomatoes

  1 Tbsp nacho cheese

  2 Tbsp refried beans

  1 small flour tortilla

  2 ounces shredded monterey jack cheese

  1 medium corn tortilla

  1 chalupa shell

  1 large corn husk

  1 egg, scrambled

  3 ounces gruyere, shredded

  1 merguez sausage, cooked and sliced

  4 ounces baby bella mushrooms, sautéed in butter

  12-inch frozen meat-lover’s pizza, baked according to package directions

  1.5-2 gallons vegetable oil

  8 cans vegetarian chili, heated'
raw_procedure: 'NOTE: It’s recommended to remove the corn husk (as corn husks are inedible), and omit the blueberry pancake all together.  Additionally, if you want more compatible flavors, substitute chorizo for the merguez, additional monterey jack for the gruyere, and skip the pico de gallo/baking step.  Frying this taco is dangerous - make sure to use extra long/wide tongs, protective gloves, and extreme caution when lowering it into the hot oil.  Better yet, just don’t make this thing at all please.

  Brown the ground beef and add the taco seasoning, along with 2-3 tablespoons of water, as per package instructions.

  Heat very large pot of oil (at least 15 inches in diameter) to 350°F.  Begin assembling the taco: start by filling a crunchy taco shell with ground beef, and topping with lettuce, tomatoes, southwestern sauce, and nacho cheese.  Spread refried beans on a flour tortilla, and wrap around taco shell.  Place monterey jack cheese on a toasted corn tortilla, and wrap that around the flour tortilla.  Fill a chalupa shell with guacamolito sauce and place the multi-layered taco inside.  Place the chalupa taco into a corn husk, and top with pico de gallo - bake in a 350°F oven for 5 minutes.  Meanwhile, cover a single crepe with scrambled eggs, merguez sausage, and gruyere cheese.  Take the taco out of the oven, remove the corn husk, and wrap inside the crepe.  Place the crepe-taco onto the meat lovers pizza, wrap it around the taco, and finish by wrapping the blueberry pancake around the pizza.  Press together as tightly as possible without breaking any of the layers. Secure with long wooden skewers,
  and using a wide casserole filled with some beer batter, cover the entire taco in batter.  Using extreme caution, place the battered taco in the hot oil, basting with a metal ladle if not completely covered by the oil.  Fry for 10 minutes on each side, until golden brown and crispy all over.  Remove from the oil and allow to cool for 5-10 minutes on a wire rack in a rimmed baking sheet.  Fill a canvas bag with vegetarian chili, and place the taco inside.  Enjoy?'
