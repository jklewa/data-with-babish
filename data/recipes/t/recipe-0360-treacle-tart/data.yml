babish_id: recipe-0360
name: Treacle Tart
image_link: null
raw_ingredient_list: '16 ounces light molasses

  2 Tbsp butter

  3 Tbsp heavy cream

  ¼ cup bread crumbs

  1 large egg'
raw_procedure: 'Take 16 ounces of light molasses and combine with 2 Tbsp of butter on a low heat just until the butter melts in a saucepan.

  Add 3 Tbsp of heavy cream and whisk rigorously until the mixture cools slightly, just enough to not cook an egg. Then beat in ¼ cup of bread crumbs and 1 large egg.

  Add filling to baked tart crust and place in a 350° F oven for 45-50 minutes.

  Allow to cool completely.

  Top with whipped cream.

  Serve and enjoy!'
