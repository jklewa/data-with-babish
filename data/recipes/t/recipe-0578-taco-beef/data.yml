babish_id: recipe-0578
name: Taco Beef
image_link: ''
raw_ingredient_list: '1 lb ground beef

  ½ onion, finely chopped

  ½ cup chicken stock

  Kosher salt

  Freshly ground pepper'
raw_procedure: 'In a sauté pan, brown 1 pound of ground beef until it is barely pink in the center. Let the fat pool on one side of the pan and add ½ of a small finely chopped onion into the fat. Sweat the onions for about 2 minutes prior to tossing with the beef and seasoning it (see seasoning method below).

  Allow the spices to mix for about 1 minute before pouring in ½ cup of chicken stock. Season generously with kosher salt and freshly ground pepper. Let it reduce for another 2 to 3 minutes until it is thick.'
