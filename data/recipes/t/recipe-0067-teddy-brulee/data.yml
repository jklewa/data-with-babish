name: Teddy Brulee
image_link: null
raw_ingredient_list: 'Marshmallows

  Chocolate of your choice

  Graham crackers'
raw_procedure: 'Start with a 9x13 casserole dish and lightly coat with vegetable oil, as well as some parchment paper. Once that is done, dust the whole thing down with powdered sugar. Make sure everything is evenly coated.

  Add your marshmallow mixture to the casserole dish and let it sit uncovered for 4 hours.

  Liberally coat your work surface with powdered sugar and turn your marshmallow out on top of the powdered sugar.

  Lightly coat a knife in oil and powdered sugar and cut your marshmallows into 1 inch cubes.

  Preheat a cast iron skillet in a 400°F oven and then add your chocolate first, followed by the marshmallows. Place in the 400°F oven for 7-10 minutes, rotating halfway through.

  Serve with graham crackers and enjoy!'
