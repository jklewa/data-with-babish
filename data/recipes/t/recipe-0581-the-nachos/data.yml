name: The Nachos
image_link: ''
raw_ingredient_list: 'Homemade tortilla chips

  Hand-shredded cheese

  Taco beef

  Homemade queso

  Black beans

  Chopped white onion

  Chopped tomato

  Homemade pickled jalapeños

  Homemade guacamole

  Sour cream'
raw_procedure: 'On top of the first layer of chips, add a generous sprinkling of your hand-shredded cheeses, a cautious sprinkling of your taco meat, and a drizzle of your queso. Then, add a sprinkling of black beans, chopped white onion, chopped tomato, and a few of your homemade pickled jalapeños. Repeat this step three times on top of each layer of chips.

  Place your plate of nachos onto a rimmed baking sheet and bake for 20 minutes at 350°F. Once 20 minutes has passed, top everything off with sour cream and your homemade guacamole.'
