name: Toasted Jalapeño Points
image_link: null
raw_ingredient_list: '8 ounces cream cheese, softened

  5-6 jalapeños, seeded and diced (with additional slices for garnish)

  6 ounces mozzarella, shredded

  Store bought puff pastry

  2 eggs'
raw_procedure: 'In a bowl combine 8 ounces of softened cream cheese with 5-6 seeded and diced jalapeños along with 6 ounces of mozzarella cheese. Stir to combine.

  Roll out your store bought pastry and cut into even squares. Beat 2 eggs in a bowl and brush egg wash along all 4 edges of puff pastry square. Place a dollop of your cream cheese mixture in the middle and fold it over on itself. Crimp the edges shut and then brush outside with an egg wash.

  Season with salt and place a slice of jalapeño in the middle as a garnish.

  Place in a 400°F oven for 10-15 minutes or until golden brown.

  Let cool then serve and enjoy!'
