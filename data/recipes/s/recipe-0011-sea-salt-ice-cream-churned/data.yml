babish_id: recipe-0011
name: Sea Salt Ice Cream (Churned)
image_link: null
raw_ingredient_list: '1 ½ cup milk

  1 ½ cup cream

  ¾ cup sugar

  3 Tbsp cornstarch

  1 tsp sea salt

  Teal gel-based food coloring'
raw_procedure: 'Mix together 1 ½ cups each of high quality milk and cream. Combine 3 Tbsp cornstarch in about 1 cup of milk and cream mixture until it is dissolved and no lumps remain.

  Bring the remaining milk and cream mixture close to a simmer on the stovetop. Then, ¾ cup sugar is added directly to the milk and cream on the stovetop until it dissolves over medium-low heat until just simmering. At this point you will add the cornstarch mixture until combined. Let that all cook for about 1 minute.

  Add one heaping tsp of sea salt to custard on stovetop as it finishes thickening. Then strain into a heat-proof bowl. Add some gel-based teal food coloring.

  Into an ice cream machine it goes for about 25 minutes.

  After that’s done, pour into a piping bag in order to cleanly fill popsicle molds. Use stick alignment to assure sticks stand up straight, and in the freezer it goes for at least 6 hours up to overnight.

  Run under hot water to easily take out popsicles and enjoy!'
