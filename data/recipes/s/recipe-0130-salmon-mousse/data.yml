name: Salmon Mousse
image_link: null
raw_ingredient_list: '3-4 ounces smoked salmon

  Juice of ½ a lemon

  Cucumber, sliced (for garnish)

  4 ounces Neufchatel Cheese (or cream cheese)'
raw_procedure: 'Add 3-4 ounces of smoked salmon to a food processor along with the juice of ½ a lemon and 4 ounces of Neufchatel Cheese (or cream cheese if you can’t find that).

  Add to a bowl. Cover and refrigerate.

  Place a slice of cucumber on top of a buckwheat blini and then top with salmon mousse.'
