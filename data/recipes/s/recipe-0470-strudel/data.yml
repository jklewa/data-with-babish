babish_id: recipe-0470
name: Strudel
image_link: null
raw_ingredient_list: '1 ½ cups bread flour

  4 Tbsp vegetable oil

  2 egg whites

  ¼ tsp salt

  ½ Tbsp of lemon juice

  ¼ cup of warm water (approximately 110°F)

  4 good baking apples, peeled (such as granny smith)

  ½ cup sugar

  1 Tbsp cinnamon

  ½ cup raisins

  Zest of 1 lemon

  Some lemon juice (optional)

  2 Tbsp melted butter

  ½ cup finely chopped hazelnuts and walnuts

  1 beaten egg'
raw_procedure: 'In a medium bowl, place bread flour and make a little well in the middle. In that well, pour vegetable oil, egg whites, salt, and lemon juice. Give this a little mix with your hands until it just barely comes together. Add warm water and mix with hands until it forms a semi-cohesive dough. Add flour if too sticky, but not too much.

  Flour your worktop and just knead the hell out of the dough. Seriously, pound it against the table. Take your frustrations out on the dough until you end up with a soft and supple dough. When finished, place in an oiled bowl and let rest for 30 minutes.

  Peel and finely chop the apples. Place them in a large bowl and season with sugar, cinnamon, raisins, lemon zest, and lemon juice (if you want to prevent the apples from browning). Add a few tablespoons of flour to soak up the moisture. Allow to rest for 30 minutes.

  Cover table in large, clean tablecloth and liberally dust with flour. Plop down your dough and dust your rolling pin with flour. Roll out until it is a large circle, about 18-24 inches wide. Dust your knuckles and carefully pick up your dough. Rotate the dough with your fists carefully, like a fragile pizza pie. Get it as large as you can without tearing it and then set it down. Slowly tug at the edges until it is thin enough so you can see the pattern of the tablecloth through the dough. Slice the rough edges off.

  Using a pastry brush, drizzle the dough with the melted butter. Gently brush the butter so every square inch is covered with melted butter. Sprinkle the chopped walnuts and hazelnuts all over the buttered dough.

  Place a generous row of the spiced apples at the end of the dough square. Using the tablecloth, roll the dough onto itself. Tuck the edges and brush with some more butter. Repeat until the strudel is all rolled up. Seal the edges.

  Preheat oven to 350°F. Place strudel on parchment lined baking sheet and brush down with beaten egg. Place in the oven. Every ten minutes, brush the strudel with melted butter. It should bake for about an hour or until golden brown. Leave on a wire rack to cool.

  After cooled, cut into the strudel. Dust the piece with powder sugar and don’t forget the whipped cream.'
