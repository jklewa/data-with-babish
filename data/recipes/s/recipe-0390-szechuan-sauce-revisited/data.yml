babish_id: recipe-0390
name: Szechuan Sauce Revisited
image_link: null
raw_ingredient_list: '½  cup water

  ½  cup white vinegar

  ½  cup white sugar

  ½ cup soy sauce

  1 Tbsp apple cider vinegar

  ½ tsp sesame seed oil

  ¼ tsp garlic powder

  ¼ tsp onion powder

  ¼ tsp ground ginger

  ¼ yeast extract (marmite)

  ¼ dextrose (corn syrup)

  Ground black pepper to taste

  2 Tbsp cornstarch

  1 tsp xanthan gum'
raw_procedure: 'Combine water, vinegar, sesame seed oil, garlic powder, onion powder, garlic powder, ground ginger, marmite, corn syrup and ground pepper in a medium sized bowl and transfer to a medium sauce pan.

  Remove 1/4 cup of sauce and add cornstarch. Remove another 1/4 cup and add the xanthan gum. Add both back into the mixture, straining the xanthan gum mixture for lumps and whisk over medium heat until it forms a sauce like goo. Strain, cover and let it cool down.'
