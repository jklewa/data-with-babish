babish_id: recipe-0523
name: Sorta-Homemade Stock
image_link: null
raw_ingredient_list: '1 carton of store-bought stock

  1 carrot, chopped into large pieces

  1 large onion, halved

  1 shallot, halved

  1 head garlic, halved

  1 two-inch piece of ginger, peeled

  ½ bunch parsley

  4 sprigs thyme

  Soy sauce (to taste)

  Worcestershire sauce (to taste)'
raw_procedure: Pour a glug of your cooking oil of choice into a saucepan and heat over medium high heat until shimmering. Add vegetables to brown. The more dark brown color on the vegetables, the more flavor that will be added to the stock. Once nice and brown, add a carton of store bought stock and some fresh herbs like parsley and thyme. Cook for one hour and strain.
