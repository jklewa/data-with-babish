babish_id: recipe-0179
name: Spa-Peggy and Meatballs
image_link: null
raw_ingredient_list: '1 pound ground beef

  1 egg

  ½ cup bread crumbs

  Splash of milk

  Garlic powder

  Onion powder

  Oregano

  Dried basil

  Salt

  Pepper

  Parmesan cheese

  Spaghetti

  1 onion

  1 clove garlic

  1 can crushed tomatoes

  Pinch of sugar'
raw_procedure: 'In a large glass bowl combine 1 pound of ground beef with 1 egg, ½ cup of breadcrumbs, a splash of milk, a few dashes each of garlic powder, onion powder, oregano, dried basil, salt, and pepper. Add a healthy sprinkling of parmesan cheese. Mix to combine.

  Roll into balls and bake at 400°F for 15-20 minutes.

  In a large pan add 1 diced onion. Let it sweat for a few minutes before adding one clove of minced garlic. Let cook for a minute or until fragrant before adding 1 can of crushed tomatoes. Let simmer for 30 minutes and then add a pinch of sugar. Stir to combine.

  Add meatballs to the sauce and make sure they’re well coated. Cover and cook for 15-20 minutes.

  In a pot cook some store bought spaghetti and when it’s just about done cooking, reserve ½ a cup of pasta water.

  Strain pasta.

  Remove meatballs from sauce.

  Add your ½ cup of reserved pasta water back to the pasta before adding your sauce. Mix to combine.

  Add spaghetti to a bowl and top with meatballs and additional parmesan cheese.'
