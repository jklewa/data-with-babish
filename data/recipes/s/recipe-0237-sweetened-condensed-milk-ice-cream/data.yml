babish_id: recipe-0237
name: Sweetened Condensed Milk Ice Cream
image_link: null
raw_ingredient_list: '1 pint of heavy whipping cream

  1 can sweetened condensed milk (14 ounces)

  4 tbsp melted butter (optional)

  2 heaping tbsp cocoa powder (or more to taste)'
raw_procedure: 'Whip some heavy whipping cream in a stand mixer (with the whisk) until it becomes whipped cream, and set aside.

  In a medium sized bowl, empty one 14-ounce can of sweetened condensed milk and optionally ½ stick of melted butter. Add 2 Tbsp of cocoa powder and whisk to combine. Add more cocoa powder if needed for optimal chocolatey-ness.

  Next, add your whipped cream mix to the bowl and slowly fold in until everything is evenly combined. Once everything is combined with no streaks, cover with plastic wrap and freeze for at least four hours, or overnight.

  Serve and enjoy!'
