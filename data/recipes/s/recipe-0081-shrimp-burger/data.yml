babish_id: recipe-0081
name: Shrimp Burger
image_link: null
raw_ingredient_list: '3 scallions, chopped

  ⅔ cup mayonnaise, divided into ⅓ cup and ⅓ cup

  1 tsp pepper

  1 tsp creole seasoning

  Juice and zest of ½ a lemon

  1 tsp Louisiana Style hot sauce

  1 tsp whole grain mustard

  2 ⅓ Tbsp fresh parsley, chopped, divided

  1 slice of white bread

  1 pound of shrimp, peeled and deveined

  Salt

  Pepper

  1 tsp Old Bay

  Hamburger buns

  Iceberg lettuce'
raw_procedure: 'Start by making remoulade. In a bowl combine 1 chopped scallion, ⅓ cup of mayonnaise, some pepper, 1 tsp creole seasoning, the juice and zest of ½ a lemon, 1 tsp of Louisiana Style hot sauce, 1 tsp whole grain mustard, and 1 tsp freshly chopped parsley. Mix to combine and put in the fridge until ready to use.

  In a food processor, process 1 slice of white bread into bread crumbs. Put in a bowl and add 2 chopped scallions, 2 Tbsp freshly chopped parsley, ⅓ cup of mayo, salt, pepper, and 1 Tbsp Old Bay seasoning. Mix to combine.

  Then, in the food processor add 1 pound of peeled and deveined shrimp. Process about 8-9 times and then add to the bread crumb mixture. Mix all that together and form into nice patties.

  Place the patties on a sheet pan and cover with plastic wrap. Place in the fridge for 30 minutes and up to 3 hours.

  In a non stick pan, toast some hamburger buns and set aside.

  Add some vegetable oil to the pan and add your shrimp burgers. Fry on one side for 2-3 minutes and then flip. Add to a 375°F oven until the burgers reach an internal temperature of 140°F.

  Place burger on a bun with some iceberg lettuce and top with your remoulade.

  Serve and enjoy!'
