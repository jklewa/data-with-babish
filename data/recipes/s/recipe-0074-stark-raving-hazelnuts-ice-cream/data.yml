babish_id: recipe-0074
name: Stark Raving Hazelnuts Ice Cream
image_link: null
raw_ingredient_list: 'Hazelnuts, blanched and peeled

  1 ½ cups sugar, divided

  3 Tbsp water

  Salt

  24 ounces greek yogurt, strained

  ⅓ cup cocoa powder, sifted

  1 cup low fat milk

  1 Tbsp vanilla extract

  1 Tbsp Instant coffee'
raw_procedure: 'If your hazelnuts aren’t peeled, you’ll need to add them to a pot with 2 cups of water and 3 Tbsp of baking soda. Bring the water to a boil and cook until the water turns black. Drain them and add them to an ice bath and then peel the skins off. Add them to a 350°F oven and roast for 5-7 minutes.

  In a saucepan add ¾ cup of sugar, 3 Tbsp of water and a pinch of salt. Whisk to combine and keep stirring until it’s a light golden brown. Add your toasted hazelnuts and make sure each one is coated in sugar.

  Add hazelnuts to a parchment lined baking sheet and separate so all hazelnuts are flat and not on top of each other. Let cool for 15 minutes.'
