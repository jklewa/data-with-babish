babish_id: recipe-0012
name: Sea Salt Ice Cream (No Churn)
image_link: null
raw_ingredient_list: '1 ½ cup milk

  1 ½ cup cream

  ¾ cup sugar

  3 Tbsp cornstarch

  Packet of gelatin

  7 ½ ounces glucose

  1 tsp sea salt

  Teal gel-based food coloring'
raw_procedure: 'Combine milk and cream in a bowl. Pour in about 1 cup of that mixture in a separate bowl and add 3 Tbsp of cornstarch. To the cornstarch mixture add in a packet of gelatin and whisk until fully hydrated.

  Add about 7 ½ ounces of glucose to remaining milk and cream mixture on stovetop at medium-low until it dissolves completely before adding thickeners.

  Add cornstarch mixture and let simmer for a minute, then add 1 tsp sea salt as it finishes thickening. Strain into heat-proof bowl. Add and whisk together gel based teal food coloring.

  After that’s done, pour into a piping bag in order to cleanly fill popsicle molds. Use stick alignment to assure sticks stand up straight, and in the freezer it goes for at least 6 hours up to overnight.

  Run under hot water to easily take out popsicles and enjoy!'
