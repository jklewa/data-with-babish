name: Semolina Pasta
image_link: null
raw_ingredient_list: ''
raw_procedure: 'Start by mixing half all-purpose flour, half semolina flour and then dumping the flour onto the countertop.

  Make a mound of the two flours with a crater in the center and dumping two eggs into the center with a little bit of olive oil.

  Grab a fork and beat the eggs picking up a little flour with every stroke of the fork.

  Once it becomes too sticky grab a bench scraper and start folding everything towards the center.

  Once a shaggy dough starts to form begin to knead the dough by hand for a solid ten minutes. Knead until sore, or when the dough has the consistency of play dough.

  Wrap the dough TIGHTLY in plastic wrap and let sit in room temperature for at least thirty minutes.

  After thirty minutes, unwrap the dough and start flouring everything - your hands, the dough, the rolling pin, the countertop, and anything else you think needs flouring around you.

  Once finished flouring, cut the dough down the center into two halves.

  At least laminate the dough before running through the pasta machine.

  With the pasta machine on its widest setting it’s time to start running it through.

  This machine’s widest setting is a 7 and we want to get it down to a 2, so this means running it through at least 4 to 5 times.

  This means that the dough will start to get a little long, so I recommend cutting it into two pieces and work those individually.

  Once the dough has been rolled/thinned down to a 2, dust your dough with some flour before running through the pasta machine and making some linguini.

  Make sure that they noodles do not stick to each other after running through the blades, and then toss your noodles with some more flour to ensure no sticking.

  Place and keep under a plastic wrap, or a ziploc bag and frozen until you are ready to use.

  Enjoy!'
