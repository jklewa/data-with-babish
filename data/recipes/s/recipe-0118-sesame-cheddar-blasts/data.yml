name: Sesame Cheddar Blasts
image_link: null
raw_ingredient_list: 'Puff Pastry #2

  Cheddar cheese

  Sesame oil'
raw_procedure: 'Place some cheddar cheese on half of your rolled out puff pastry and then cover by folding the puff pastry in half. Roll it out and then cut into ½ inch wide strips.

  Twist them into twists and place them on a parchment lined baking sheet. Brush them with sesame oil and top with some sesame seeds.

  Place in a 400°F oven for 15 minutes and cook until golden brown and flaky.

  Remove from oven, let cool, and then serve and enjoy.'
