babish_id: recipe-0532
name: Carmella's Baked Ziti
image_link: null
raw_ingredient_list: '1  pound ziti noodles

  Tomato sauce (see above)

  Mozzarella cheese (½ inch chunks)

  Ricotta cheese

  Parmesan cheese, grated'
raw_procedure: 'Cook 1 pound of ziti noodles to very al dente for no more than 5 minutes. Pour your pasta into a large bowl and toss with a cup or two of your tomato sauce and mix accordingly.

  Into an aluminum pan, pour and spread about half of your pasta over the bottom of the pan.

  Spread some ricotta cheese on top of the pasta as evenly as possible and add your ½ inch chunks of mozzarella cheese on top. Then, add about 1 to 1 ½ oz of grated parmesan cheese.

  Add the remaining half of your ziti and spread it out nice and even. Make sure none of the cheese is exposed.

  Top the pan off with a cup or two of sauce and 1 to ½ oz of grated parmesan cheese.

  Cover the pan tightly with aluminum foil and place in a 350°F oven for 30 minutes.

  Once 30 minutes has passed, take the lasagna out of the oven, uncover the pan, and place back into the oven for 15-20 minutes until browned, crispy, and bubbly on top.'
