babish_id: recipe-0034
name: Corn Tortillas
image_link: null
raw_ingredient_list: '9.5 ounces masa harina

  2 tsp kosher salt

  1 cup plus 2 Tbsp water'
raw_procedure: 'To make the tortillas, measure 9.5 ounces of masa harina and whisk together with 2 tsp of Kosher salt, then add 1 cup and 2 Tbsp of warm tap water and mix until a playdough-like ball forms. Cover with plastic wrap and let sit at room temperature for 30 minutes.

  Once that’s done, form dough into golf sized balls and place in tortilla press, which you can line with a cut open Ziploc bag to easily remove tortillas.

  Place tortilla on cast iron skillet that has been preheated for 10 minutes on medium high heat. Cook for 30 seconds on each side until lightly browned. Stack and cover with a kitchen towel to keep warm for later.'
