name: Chicken Tikka Masala Marinade
image_link: null
raw_ingredient_list: '1 cup full fat yogurt

  2 inches ginger, grated

  2 garlic cloves, grated

  1 Tbsp of the homemade curry powder (above)

  Kosher salt

  Freshly ground pepper

  Drizzle of olive oil

  3 boneless, skinless, chicken breasts (cut into 1-inch cubes)'
raw_procedure: 'In a bowl add 1 cup of full fat yogurt, 2 inches of grated ginger, 2 grated garlic cloves, 1 Tbsp of the homemade curry powder, salt, pepper, and a drizzle of olive oil. Whisk to combine. Cut 3 boneless, skinless, chicken breasts into one inch cubes. Add the cubes to the yogurt mixture. Mix to combine. Cover bowl and place in fridge for at least 4 hours and up to 24 hours.

  Spread chicken out evenly on a broiler pan in a rimmed baking sheet and place under the broiler on high for 10-15 minutes or until they register 160°F internally.'
