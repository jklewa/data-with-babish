name: Chicken Marinade
image_link: null
raw_ingredient_list: '2 Tbsp vegetable oil

  2 garlic cloves, crushed

  1 tsp oregano

  1 Tbsp cumin

  1 tsp cayenne

  1 tsp paprika

  1 tsp white sugar

  1 lime, juiced

  1 Tbsp olive oil

  1 tsp kosher salt

  1 tsp freshly ground pepper'
raw_procedure: 'Make a chicken marinade: In a bowl combine 2 Tbsp vegetable oil, 2 crushed cloves of garlic, 1 tsp oregano, 1 Tbsp cumin, 1 tsp cayenne, 1 tsp smoked paprika, 1 tsp white sugar, juice of 1 lime, 1 Tbsp olive oil, salt and pepper. Whisk to combine.

  Place your chicken in a ziploc bag along with your marinade. Get all the air out and zip shut. Massage marinade to ensure an even coating.

  Place in a bowl and refrigerate for 30 minutes and up to 4 hours.'
