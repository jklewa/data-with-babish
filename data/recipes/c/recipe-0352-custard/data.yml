name: Custard
image_link: null
raw_ingredient_list: '4 Tbsp butter

  4 Tbsp flour

  2 ½ cups whole milk

  Nutmeg

  Salt

  Eggs'
raw_procedure: 'Combine 4 Tbsp each of butter and flour, while drizzling in 2 - 2 ½ cups of whole milk and whisking until a thick bechamel forms.

  Grate in some whole nutmeg and season with salt until a custard forms.'
