babish_id: recipe-0152
name: 'Chilean Sea Bass '
image_link: null
raw_ingredient_list: '1 sweet potato

  3 Tbsp Cornstarch

  Water (to add to cornstarch slowly until a slurry forms)

  Vegetable oil (enough to fill a pan for deep frying)

  Kosher salt

  3 evenly-sized Chilean Sea Bass fillets (or Black Cod as a cheaper alternative)

  2 cups green beans

  1 Tbsp rosemary

  1 small shallot

  1 cup cherry tomatoes

  ½ cup dry white wine

  ½ cup chicken stock

  Chopped parsley

  Juice of ½ a lemon

  Black pepper

  2 Tbsp butter'
raw_procedure: 'Start by peeling and spiralizing your sweet potato. In a bowl combine cornstarch and water until it makes a slurry. Add your spiralized sweet potatoes and mix until fully coated.

  Heat some vegetable oil in a deep skillet to 350°F and drop in your sweet potatoes. Fry for 3-5 minutes. Remove and place on a paper towel lined plate. Separate the sweet potatoes as best you can and season with salt. Set aside.

  Par-boil your green beans for about 3 minutes and then shock in an ice bath. Set aside.

  Finely chop 1 Tbsp of fresh rosemary and 1 small shallot. Set aside. Slice the cherry tomatoes in half and set them aside as well.

  Preheat a skillet over medium high heat. Add some vegetable oil to the pan and then add your Chilean sea bass, skin side down, to the pan. Once it’s brown on the skin side, flip and then place in a 400°F oven until it reaches an internal temperature of 135°F.

  Remove the fish from the pan and set aside. Dab away some of the excess fat from the pan and over a medium heat add shallots and sauté for about 1 minute before adding ½ cup of dry white wine and ½ cup of chicken stock. Whisk until all the fond is off the bottom of the pan.

  Add chopped rosemary and then simmer to reduce by about half. Add some chopped parsley and the juice of ½ a lemon. Stir to combine.

  Add chilled green beans to the sauce. Season with salt and pepper and cook for a few minutes. Remove green beans set aside.

  Remove the pan from heat. Add 2 Tbsp of butter to the sauce and stir to combine.

  On a plate add your lemon jus and top with green beans. Slice your sea bass into strips and add in between green beans. Add your halved cherry tomatoes and top with fried sweet potato straws.

  Serve and enjoy!'
