babish_id: recipe-0202
name: Caesar Salad
image_link: null
raw_ingredient_list: '1 egg

  1 bunch romaine lettuce, cut into bite-sized pieces and washed

  Olive oil

  Black pepper and kosher salt

  Garlic powder

  1 clove garlic

  1 ounce freshly grated parmesan, plus more for garnish

  Half a lemon, juiced

  2 Tbsp Worcestershire sauce

  2 tsp dijon mustard'
raw_procedure: 'Boil an egg for 3 minutes followed by plunging it into an ice bath.

  Cut a head of romaine into bite-sized pieces, place into a colander, and thoroughly wash before eating/using then dry on a paper towel.

  While drying, continue to tear into bite-sized pieces.

  For the croutons, add olive oil, salt and pepper and toss in bite size bread of choice. Add a bit of garlic powder and toss once more before toasting in your preheated oven until golden brown.

  For the dressing, grind one fresh clove of garlic and freshly ground pepper together with a mortar and pestle. Then add an ounce of freshly grated parmesan cheese and mash some more. Then pour into a bowl.

  Squeeze ½ lemon into the bowl, add 2 Tbsp of Worcestershire sauce and 2 tsp of dijon mustard. Whisk thoroughly.

  In a separate bowl, whisk the yolk of the boiled egg from earlier before adding it to the rest of the dressing ingredients.

  Slowly drizzle in ½ cup of good quality extra virgin olive oil while whisking together.

  In a large bowl, dress and toss the salad before plating.

  Once plated, add croutons, generous amounts of parmesan cheese (peeled into curls with a vegetable peeler), and several twists of pepper.'
