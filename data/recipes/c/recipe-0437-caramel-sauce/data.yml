babish_id: recipe-0437
name: Caramel Sauce
image_link: null
raw_ingredient_list: '½ of water

  1 cup of sugar

  1 cup of heavy cream

  ½ tsp of vanilla extract (optional)'
raw_procedure: 'In a saucepan, bring water and sugar to a boil. Stir gently, making sure the sugar doesn’t stick to the sides of the pan. Pour yourself a glass of scotch for color reference and bring the mixture to 350℉.

  While water and sugar are coming to a boil, heat heavy cream to almost boiling. Then, pour cream into water and sugar mixture a ¼ cup at a time. Continue to combine over low heat. Add vanilla extract if you desire.

  Set aside to cool and thicken.'
