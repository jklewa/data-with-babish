babish_id: recipe-0317
name: Candy Meth
image_link: null
raw_ingredient_list: '1 cup of water

  4 cups of sugar

  1 ¼ cups light corn syrup

  Blue food coloring

  Flavorants (optional)'
raw_procedure: 'In a sauce pot, combine 1 cup of water, 4 cups of sugar, 1 ¼ cups light corn syrup, and some blue food coloring.

  Stir only until all the sugar has dissolved and then cease stirring until mixture has reached 300° F (use a candy thermometer!). At this point you can add flavorants like cotton candy or something similar.

  Pour mixture onto an aluminum baking sheet and let cool completely for 1 hour.

  Use the butt end of a wooden spoon, and smash into pieces until it looks like meth.'
