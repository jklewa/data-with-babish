babish_id: recipe-0588
name: Cauliflower Macaroni & Cheese
image_link: ''
raw_ingredient_list: 'Cauliflower

  1½ cups water

  4 Tbsp (½ stick) of unsalted butter

  Panko breadcrumbs

  ½ small onion, roughly chopped

  Fresh thyme leaves

  1 garlic clove, chopped

  1-1 ½ tsp dijon mustard

  Ground white pepper

  Cayenne pepper

  2 ounces grated parmesan cheese

  5 ounces shredded yellow cheddar cheese

  Kosher salt'
raw_procedure: 'Separate the head and the cauliflower florets and finely chop them up before placing each pile into individual bowls. Set aside the core as well as the stem pieces for later.

  In a dutch oven, add 1 ½ cups of water, the cauliflower core pieces and stems, and 4 tablespoons (½ stick) of unsalted butter. Cover and bring to a simmer before adding in a steamer basket as well as the cauliflower florets. Cover and steam for about 10 minutes.

  In one sauté pan, toast up some panko breadcrumbs and butter. In another sauté pan, add ½ of a small roughly chopped onion. Sauté each pan for a few minutes until the breadcrumbs are toasted and golden brown. Add a few freshly picked thyme leaves to the breadcrumbs and set aside to cool. Add 1 chopped garlic clove to the roughly chopped onion during their last minute of cooking.

  Once 10 to 12 minutes has passed, the florets should be easy to pierce with a knife. Set aside the florets for later and add the onion and garlic mixture to the cauliflower stems and cores. Cover and let it sit for another 10 minutes until the cauliflower stems and cores are soft and easy to puree.

  After 10 minutes, add the mixture to a blender along with 1 to 1½ teaspoons of dijon mustard, a generous sprinkling of ground white pepper, a dash of cayenne pepper, 1 ounce of grated parmesan cheese, and 3 ounces of shredded yellow cheddar cheese.

  Blend on high-speed until you end up with a smooth puree. Season with kosher salt as necessary and add it to the steamed cauliflower florets. Dump everything into a baking vessel of your choice and smooth it out evenly. Top it off with 2 more ounces of shredded yellow cheddar cheese as well as some more of the panko breadcrumbs that are tossed in 1 additional ounce of parmesan cheese.

  Place into a 400°F oven for 15 minutes.'
