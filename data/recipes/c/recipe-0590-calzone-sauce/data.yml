babish_id: recipe-0590
name: Calzone Sauce
image_link: ''
raw_ingredient_list: '1 28-ounce can of San Marzano tomatoes

  ½ small onion, chopped

  2 cloves garlic

  Dried oregano

  Dried basil

  Crushed red pepper flake (Optional)

  Kosher salt

  Freshly ground pepper'
raw_procedure: 'Into a blender, add one 28 ounce can of San Marzano tomatoes, ½ of a small chopped onion, 2 cloves of garlic, a few sprinkles each of dried oregano, dried basil, and crushed red pepper flake. Hit the mixture with one second pulses until it is relatively smooth. Season with kosher salt and freshly ground pepper.

  In a saucepan, add your pizza sauce as well as a little splash of water to prevent the sauce from getting too thick. On a stovetop, cook the sauce for about 30 minutes. Set aside for later.'
