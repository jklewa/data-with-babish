babish_id: recipe-0055
name: Choclate Syrup
image_link: null
raw_ingredient_list: '1 ½ cups sugar

  1 ½ cups water

  1 cup good cocoa powder

  Kosher salt

  Instant coffee (a pinch)

  Vanilla extract, to taste'
raw_procedure: To make the chocolate syrup, combine 1 ½ cups sugar, 1 ½ cups water, and 1 cup cocoa powder in a medium saucepan. Add a pinch of salt and bring to a simmer. Whisk and simmer until everything is well combined and dissolved. At the end, add a pinch of instant coffee and a little bit of vanilla extract to deepen the syrup flavor. Pour syrup into a glass container and let it cool completely.
