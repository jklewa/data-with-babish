babish_id: recipe-0587
name: Cauliflower Fried Rice
image_link: ''
raw_ingredient_list: 'Cauliflower

  Vegetable oil

  1 egg

  6 ounces sliced shiitake mushrooms

  Chopped ham

  Frozen edamame

  1 crushed clove of garlic

  3 Tbsp soy sauce

  3 Tbsp oyster sauce

  3 Tbsp sesame oil

  Sesame seeds

  Scallions'
raw_procedure: 'Use a cheese grater to dismantle your head of cauliflower into tiny granules until you end up with a consistency that is similar to rice.

  In a large non-stick pan that is coated with vegetable oil, scramble 1 egg and set it aside for later. Wipe down the pan and use the same pan to heat up another small amount of vegetable oil for sautéing.

  Sauté 6 ounces of sliced shiitake mushrooms and let them brown up for 3 to 4 minutes before adding chopped ham and frozen edamame. Sauté for an additional 2 to 3 minutes until cooked and heated through. Then, add 1 crushed clove of garlic and sauté for one additional minute.

  Finally, add your cauliflower rice to the pan and sauté for 1 to 2 minutes before adding 3 tablespoons each of soy sauce, oyster sauce, and sesame oil. Sauté and cook everything together for another 1 to 2 minutes and add your scrambled egg to the pan and chop it up for even distribution. Top everything off with a generous sprinkling of sesame seeds.

  Garnish your rice with some thinly sliced scallions and one last sprinkling of sesame seeds.'
