name: Cappuccino
image_link: ''
raw_ingredient_list: 'Espresso (double shot)

  Steamed milk

  Foam (large layer)'
raw_procedure: This is a double shot of espresso and equal parts steamed milk and very frothy foam. Pour from up high to allow the steamed milk to mix with the coffee and then move closer while you get to the foam, which allows it to settle on top. The foam should be thick and form a clearly defined layer on top of the coffee.
