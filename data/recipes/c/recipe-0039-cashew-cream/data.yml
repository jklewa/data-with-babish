babish_id: recipe-0039
name: Cashew Cream
image_link: null
raw_ingredient_list: '16 ounces cashews (raw and unsalted)

  Water

  Salt'
raw_procedure: 'Place cashews in a large bowl, and cover with enough water to fully submerge the cashews.  Allow to soak for at least 4 hours, up to overnight (to quicken this process, you can use boiling water and allow the cashews to soak for 30 minutes).

  Drain the cashews and place in a high-powered blender.  Add just enough water to cover the cashews along with a generous pinch of salt, and blend on high speed for 1-3 minutes, until completely creamy.  Allow to cool completely, jar, and refrigerate until ready to use.'
