name: Chicken Tikka Masala
image_link: null
raw_ingredient_list: 'Chicken Tikka Masala Marinade

  2 inches ginger, grated

  1/2 small yellow onion, finely minced

  2 cloves garlic, grated

  1 small bird''s eye chili, finely minced

  2 Tbsp vegetable oil

  1 Tbsp tomato paste

  1 heaping Tbsp homemade curry powder (above)

  1 28-ounce can of crushed tomatoes

  Pinch of white sugar

  3/4 cup heavy cream'
raw_procedure: 'For the tikka masala sauce, heat 2 Tbsp of vegetable oil over medium high heat before adding ½ a small yellow onion finely minced. Cook for about 1 minute before adding 2 cloves of minced garlic, 2 inches of grated ginger, 1 small bird’s eye chili finely minced, 1 Tbsp of tomato paste, and 1 heaping Tbsp of homemade curry powder. Mix them together for about 30 seconds before adding one 28-ounce can of crushed tomatoes along with a little bit of sugar to help with the acidity. Cook for 5 minutes.

  Start cooking your rice at this point, if you’d like to have rice.

  Add ¾ of a cup of heavy cream to your sauce. Stir to combine.

  Next add your chicken to the sauce and cook for about 5-10 minutes. Taste for seasoning and add salt and pepper if needed.

  Plate up by putting a bed of rice down first, followed by your chicken tikka on top, and then garnish with some cilantro.

  Serve and enjoy!'
