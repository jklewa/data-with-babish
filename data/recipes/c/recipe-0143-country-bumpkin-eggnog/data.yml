babish_id: recipe-0143
name: Country Bumpkin Eggnog
image_link: null
raw_ingredient_list: '2 ounces bourbon

  ½ ounce cognac

  ½ ounce Luxardo Maraschino liqueur

  ½ ounce simple syrup

  1 egg

  Ice

  Milk

  Orange zest

  Fresh nutmeg'
raw_procedure: 'In a cocktail shaker, combine 2 ounces of bourbon, ½ an ounce of cognac, ½ an ounce of Luxardo Marschino, ½ an ounce of simple syrup, and 1 egg. Shake to combine (without ice!).

  Add ice to the shaker and shake again to combine.

  Pour into a glass and add as much milk as you’d like. Top with orange zest and grated nutmeg.

  Serve and enjoy!'
