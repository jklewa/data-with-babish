babish_id: recipe-0273
name: Chili
image_link: null
raw_ingredient_list: 'Ancho chilis (3-4 depending on size)

  2 tsp cumin

  2 tsp ground coriander

  2 tsp paprika

  1-2 canned chipotles in adobo (depending on heat preference)

  1 lb ground beef

  1 small onion, diced

  2 cloves of garlic

  1 can diced tomatoes

  Salt

  Pepper'
raw_procedure: 'Begin by toasting your ancho chilis until they just barely start to smoke and then place in boiling water for 10 minutes.

  In a blender add the chilis and water along with 2 tsp each of cumin, ground coriander seed, paprika, and 1-2 canned chipotles in adobo sauce (depending on your heat preference) and blend together.

  In a pan, brown 1 pound of ground beef. Once browned, remove from the pan. Put a chopped onion and 2 cloves of minced garlic into the pan to cook in the beef fat. Once fragrant and translucent, add ancho chili mixture, 1 can of diced tomatoes, and the ground beef. Stir to combine, season with salt and pepper, and set aside.'
