name: Duxelle
image_link: null
raw_ingredient_list: 'Olive oil

  Finely chopped mushrooms

  1 clove finely minced garlic

  ¼ cup of brandy

  ⅓ cup heavy whipping cream'
raw_procedure: 'Heat olive oil over medium high heat along with some very finely processed mushrooms.

  Add one clove of finely minced garlic with a little bit of thyme.

  Cook until just fragrant and deglaze with about ¼ cup of brandy, scraping up all the good brown bits off the bottom of the pan.

  Add heavy whipping cream, creating a flavorful mushroom paste.

  Set aside.'
