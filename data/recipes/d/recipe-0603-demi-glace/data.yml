babish_id: recipe-0603
name: Demi-Glace
image_link: ''
raw_ingredient_list: '2 quarts bone broth

  2-3 Tbsp tomato paste

  1 cup dry red wine

  2 Tbsp chopped dill

  2 pinches Kosher salt'
raw_procedure: 'Strain (cheesecloth or coffee filter) 2 quarts of bone broth in the widest stock pot you have.

  Add 2-3 Tbsp of tomato paste and 1 cup of dry red wine.

  Bring up to a simmer and let reduce up to 75% so all that remains is thick syrupy sauce.

  Once it is thick enough to cover the back of spoon, place in a bowl and let cool. Divy it up into portions using a cupcake tin.

  Let portions solidify in the fridge and then wrap in plastic wrap and tin foil or vacuum seal.

  Place in freezer for up to 6 months.  It makes a great pan sauce!'
