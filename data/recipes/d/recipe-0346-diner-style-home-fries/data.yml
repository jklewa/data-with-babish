babish_id: recipe-0346
name: Diner Style Home Fries
image_link: null
raw_ingredient_list: '3 peeled potatoes

  3 Tbsp white vinegar

  3 pinches kosher salt

  1 Tbsp vegetable oil

  1 Tbsp butter

  1 pinch osalt

  A teaspoon paprika (if desired)

  1 pinch pepper'
raw_procedure: 'First, dice 3 peeled potatoes. Set in pot and cover with cold water and add white vinegar and 3 pinches of salt.

  Bring potatoes to a boil and cook for 5 minutes.

  Spread on a paper towel-lined baking sheet to let cool.

  Place 1 Tbsp of butter and 1 Tbsp of vegetable oil into a cast iron skillet. Cook potatoes in batches to keep from undercooking.

  Add potatoes and let sit for 4 minutes or until potatoes have a golden crust on one side.

  Repeat until potatoes are a golden crispy brown all over.

  While warm, season potatoes with 2 pinches of kosher salt, paprika (if desired), and 2 pinches of freshly ground pepper.

  Toss potatoes to evenly season throughout.'
