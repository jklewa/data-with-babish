babish_id: recipe-0278
name: Dumplings
image_link: null
raw_ingredient_list: '2 eggs

  1 Tbsp sour cream

  Salt

  Pepper

  ¾ cup of flour'
raw_procedure: 'In a bowl, combine 2 eggs, 1 Tbsp of sour cream and some salt and whisk together. Once combined, slowly add your flour. ¾ of a cup is the recommended amount, but you’re going more for consistency rather than an exact amount. Add flour until you’ve reached a consistency that’s like an extra thick pancake batter.

  Then using a spoon dipped in hot water scrape about ½ tsp or your mixture into a pot of boiling water and simmer them for 6-10 minutes or until they’ve reached your prefered level of doneness.

  Strain dumplings, put back in pot with 1 tbsp of butter and season with salt and freshly ground pepper.'
