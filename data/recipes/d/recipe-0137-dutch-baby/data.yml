babish_id: recipe-0137
name: Dutch Baby
image_link: null
raw_ingredient_list: '3 eggs

  ½ cup flour

  ½ cup milk

  1 Tbsp sugar

  ¾ cup butter, divided

  ½ cup sugar

  1 ½ tsp cinnamon

  1-2 Tbsp molasses

  1 cup powdered sugar

  2 Tbsp half and half'
raw_procedure: 'In a food processor or blender combine: 3 eggs, ½ cup of flour, ½ cup milk, and 1 Tbsp sugar. Mix for about 15 seconds or until there are no chunks. Set aside.

  In a small bowl combine: ¼ cup butter, ¼ cup sugar, 1 ½ tsp cinnamon and about 1-2 Tbsp molasses. Mix until fully incorporated. Add to a piping bag and set aside.

  In another bowl combine 1 cup powdered sugar and 2 Tbsp half and half. Whisk to combine. Add more of either as needed to obtain a good drizzle-able consistency. Add to a squeeze bottle.

  On the stovetop in a pan over medium high heat, melt ½ cup butter. Once it’s nice and foamy, pour in batter. Then, using the piping bag, add your cinnamon swirl.

  Place in a preheated 425°F oven and cook for 20 minutes. Then lower the temperature to 350°F and cook for an additional 5 minutes.

  Remove from oven and drizzle with sugar glaze.

  Serve and enjoy!'
