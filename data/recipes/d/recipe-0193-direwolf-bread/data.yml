babish_id: recipe-0193
name: Direwolf Bread
image_link: null
raw_ingredient_list: '½ cup butter

  85g whole wheat flour

  85g all purpose flour

  ½ tsp salt

  1 tsp baking powder

  ¼ tsp baking soda

  ¼ cup white sugar

  2 Tbsp sage, chopped

  1 ½ cups toasted pecans

  ½ cup buttermilk

  1 egg

  Honey

  Butter'
raw_procedure: 'Start by browning ½ cup of butter in a saucepan and then place it in a small bowl. Put in freezer until completely frozen.

  Next combe 85 grams each of whole wheat flour and all purpose flour. Add ½ tsp salt, 1 tsp baking powder, ¼ tsp baking soda and ¼ cup white sugar. Whisk to combine.

  Add your frozen butter to the dry mixture and use a pastry cutter or fork and knife to cut up the butter and combine it until butter pieces are about the size of a pea. Chop some sage and add that to the mixture as well.

  Toast about 1 ⅓ cups of pecans and let them cool completely before adding to the mixture and tossing to combine.

  Add ½ cup of buttermilk and fold gently to combine.

  Flour your work surface and turn out your mixture. Work in the flour just a little bit before making it into a disc large enough to make a direwolf from it. Cut the direwolf out from this template.

  Brush the wolf down with a beaten egg and bake at 425°F for about 20 minutes or until golden brown.

  Cool on a rack. While it’s cooling, combine 2 parts butter to 1 part honey for a delicious honey butter mixture to put on your direwolf scone.

  Serve and enjoy!'
