raw_procedure: 'Shred 8 ounces each of monterrey jack and sharp cheddar cheese. Place it all in a broiler safe serving dish.

  Place in the oven at 425°F for about 12 minutes until it becomes bubbly, brown, and melted.

  Serve and enjoy!'
