babish_id: recipe-0223
name: Omelette
image_link: null
raw_ingredient_list: '12 eggs

  1 red pepper

  1 green pepper

  16 ounces mushrooms

  Salt'
raw_procedure: 'Cut up 1 red pepper, 1 green pepper, and 16 ounces of mushrooms.

  In a cast iron skillet melt 1-2 Tbsp of butter over medium heat. Add your mushrooms with a generous pinch of salt. Once the mushrooms have dried out a little bit, add your peppers and saute until everything is nice and soft. Place in a bowl and set aside.

  In the same cast iron skillet add 1-2 Tbsp of butter along with a few tsp of olive oil. In a separate bowl combine 12 eggs and whisk to combine. Pour this mixture into the pan. Stir around with a fork until some curds form. Keep doing this until you can see the bottom of the pan when you move the fork. At this point let the eggs cook for about 2 minutes and let a sort of omelette crust form. Add your mushroom and pepper fillings and fold the omelette shut.

  Using two spatulas, move to a large plate. Cover with 4 cups of chili, 2 cups of american cheese and add two biscuits. You have one hour to finish this omelette and 5 pounds of fruit. Enjoy!'
