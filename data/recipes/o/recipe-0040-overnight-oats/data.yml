babish_id: recipe-0040
name: Overnight Oats
image_link: null
raw_ingredient_list: '1/2 cup old fashioned oats

  1/4 cup chia seeds

  1/4 cup cashew cream, diluted with 3/4 cup water to make cashew milk

  Vanilla Extract

  Artificial sweetener of your choice

  Pinch of kosher salt

  Berries and mint for topping'
raw_procedure: 'Put ½ cup of old fashioned oats, ¼ cup chia seeds, and ¼ cup cashew cream (diluted with 3/4 cup water) in mason jar.

  You can also add about a teaspoon of vanilla extract, an artificial sweetener of your choice, and a pinch of Kosher salt.

  Close and give a good shake, put in fridge, and let sit overnight.

  Add berries of your choice and mint to top it off!'
