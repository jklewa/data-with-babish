babish_id: recipe-0371
name: Peanut Butter Drizzle
image_link: null
raw_ingredient_list: '½ cup heavy cream

  ¼ cup sugar

  ¼ cup light corn syrup

  2 Tbsp unsalted butter

  A little bit of vanilla paste (optional)

  ½ cup smooth peanut butter'
raw_procedure: 'In a saucepan, combine heavy cream, sugar, light corn syrup, butter, and vanilla paste (if you desire) and heat until just steaming and all of the ingredients are incorporated.

  Let mixture cool slightly and then add peanut butter. Mix until smooth and then pour into a glass mason jar and set aside.'
