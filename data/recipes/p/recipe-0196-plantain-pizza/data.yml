babish_id: recipe-0196
name: Plantain Pizza
image_link: null
raw_ingredient_list: '¼ tsp baking soda

  Italian seasoning

  2 Tbsp olive oil

  Salt

  Plantains

  Mozzarella

  Parmesan cheese, grated'
raw_procedure: 'In a food processor, add 2 plantains along with ¼ tsp baking soda, some italian seasoning, 2 Tbsp olive oil, and some salt. Blend into a paste.

  Add parchment paper to a baking sheet, and cover lightly with oil. Put plantain mixture on top of parchment paper in a small circle the size of a small pizza.

  Bake in an oven at 375°F for about 12 minutes until it comes out golden brown and place on a cooling rack to let cool.

  Add it to a well-oiled baking sheet and top with sauce, mozzarella cheese, and parmesan cheese.

  Place back in the oven and cook for an additional 10 minutes.

  Remove and let cool for 5 minutes.

  Serve and enjoy!'
