babish_id: recipe-0577
name: Pickled Jalapeños
image_link: ''
raw_ingredient_list: '8 jalapeños

  2 cups white vinegar

  2 cups water

  4 smashed garlic cloves

  3 Tbsp kosher salt

  ½ cup plain white sugar'
raw_procedure: 'Cut 8 jalapeños into thick slices. For a quick pickling brine, into a medium saucepan, combine 2 cups of plain white vinegar, 2 cups of water, 4 smashed cloves of garlic, 3 tablespoons of kosher salt, and ¼ cup of plain white sugar.

  Bring the mixture to a boil over medium-high heat and whisk until the sugar and salt are dissolved. Add the jalapeños, turn off the stove, and give the mix a stir. If you happen to see any garlic cloves that have turned blue, don’t fret because it is totally normal. Set aside and allow the jalapeños to cool.'
