name: 'Puff Pastry #2'
image_link: null
raw_ingredient_list: '8 ½ ounces all purpose flour

  8 ounces cold butter, cubed

  ½ cup sour cream'
raw_procedure: 'Place flour in a medium bowl. Cut in butter until mixture is the size of small peas.

  Add sour cream. Stir with a fork until pastry forms a ball. Wrap in plastic and chill overnight. When ready to use, roll pastry thinly.'
