babish_id: recipe-0058
name: Peeps and M&M’s Chili (Champorado)
image_link: null
raw_ingredient_list: '1 ½ cups rice (sticky, sushi or arborio)

  2 ½ cups water

  2 ½ cups evaporated milk

  ⅓ cup unsweetened cocoa powder

  Salt

  ⅓ cup granulated sugar

  4 ounces dark chocolate

  1 tsp vanilla extract

  1 tsp espresso powder

  Sweetened condensed milk

  Peeps, chopped (optional)

  M&M’s (optional)'
raw_procedure: 'Into a large pot add 1 ½ cups of rice along with 2 ½ cups of water, 2 ½ cups of evaporated milk, ⅓ cup unsweetened cocoa powder, a pinch of salt, and ⅓ cup granulated sugar. Over medium heat bring that whole mixture to a boil and then turn the heat to medium low and simmer for 15-25 minutes. Stir occasionally.

  When the rice is nearly done, add 4 ounces of dark chocolate and stir to combine until the chocolate is melted, then add 1 tsp each vanilla extract and espresso powder. Mix to combine.

  Add to a bowl and top with some sweetened condensed milk. Optionally add some chopped peeps and M&M’s, but you might be better off leaving those out. Enjoy!'
