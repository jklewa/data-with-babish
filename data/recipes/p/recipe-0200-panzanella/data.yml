babish_id: recipe-0200
name: Panzanella
image_link: null
raw_ingredient_list: 'Ciabatta, cut into bite-sized pieces

  Olive oil

  Black pepper and kosher salt

  1 cup cherry tomatoes, halved

  1 medium cucumber, cut into bite-sized pieces

  Half a red onion, cut into bite-sized pieces

  6 small balls mozzarella, halved (ciliengini)

  White wine vinegar

  Lemons, juiced

  Dijon mustard

  1 small shallot

  1 clove garlic'
raw_procedure: 'Cut up ciabatta bread into bite-size pieces and tossed in olive oil, kosher salt, and pepper.

  Place onto a baking sheet laying flat and not overlapping each other and toast at 450°F for 5 minutes.

  Cut a plethora of cherry tomatoes into halves, a medium cucumber and red onion into bite-sized pieces, 6 small balls of mozzarella into halves, and julienne some basil.

  Place into a bowl, tossing everything together.

  For the dressing, mix white wine vinegar, a squeeze of lemon, dijon mustard, 1 minced small shallot, 1 grated clove of garlic, and kosher salt and pepper. Whisk thoroughly together until everything is mixed.

  Finally, place the toasted ciabatta bread into a bowl along with the other ingredients. Toss everything together followed by drizzling on the dressing.

  Give one more solid tossing and then plate with torn basil on top.'
