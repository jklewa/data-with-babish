babish_id: recipe-0497
name: Pizza Dough
image_link: null
raw_ingredient_list: '16 ounces bread flour, plus more for dusting

  1 Tbsp plus ½ tsp sugar, divided

  3 tsp kosher salt, divided

  ½ tsp instant yeast

  1¼ cups ice water, plus more as necessary

  1 Tbsp vegetable oil, plus more for oiling'
raw_procedure: In a food processor, pulse together the flour, 1 tablespoon sugar, 2 teaspoons salt and yeast until well combined. Combine the water and 1 tablespoon of vegetable oil and, with the machine running, slowly drizzle through the feed tube, until a sticky ball of dough forms. Transfer to an oiled surface and knead until smooth about 2 minutes. Transfer to an oiled bowl, cover with plastic wrap and refrigerate overnight.
