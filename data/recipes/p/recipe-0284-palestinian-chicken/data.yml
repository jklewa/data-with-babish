name: Palestinian Chicken
image_link: null
raw_ingredient_list: '2 cups yogurt

  ½ cup extra virgin olive oil

  8 cloves of garlic

  1 tsp ground sumac

  1 tsp cumin

  1 tsp coriander

  1 tsp cinnamon

  1 tsp allspice

  1 small onion, grated

  Fresh ground pepper

  Kosher salt

  Chicken thighs (as many as you’d like to make/marinate)'
raw_procedure: 'In a bowl, combine 2 cups of yogurt, ½ cup of extra virgin olive oil, 8 cloves of minced garlic, 1 tsp each of ground sumac, cumin, coriander, cinnamon, and allspice, 1 small onion grated, fresh ground pepper and kosher salt.

  Whisk to combine. Add chicken thighs and mix thoroughly with your hands. Cover and place in the fridge to marinate for at least 2 hours.'
