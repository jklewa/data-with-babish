babish_id: recipe-0312
name: Pizza Sauce
image_link: null
raw_ingredient_list: 'Extra virgin olive oil

  Garlic cloves

  Red pepper flakes

  28oz can of whole San Marzano tomatoes

  Onion powder

  Dried oregano'
raw_procedure: 'Start by heating olive oil in a pan over medium heat. Then add some roughly cut garlic and saute for one minute. Add some red pepper flakes and let those cook for about 10-15 seconds.

  Add a 28-ounce can of whole San Marzano tomatoes. Stir in and lightly break up the tomatoes. Add some dry onion powder along with some dry oregano, stir to combine and let simmer for 30-45 minutes.

  Add sauce to a blender and puree for about 10-15 seconds.'
