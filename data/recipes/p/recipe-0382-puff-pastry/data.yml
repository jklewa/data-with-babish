babish_id: recipe-0382
name: Puff Pastry
image_link: null
raw_ingredient_list: '2 cups all purpose flour and several extra Tbsp for dusting

  A few pinches of kosher salt

  1 cup ice water

  2 sticks unsalted butter'
raw_procedure: 'Place all purpose flour on cutting board. Create trench within the flour mound and pour in a few tablespoons of the ice water. Carefully combine the ice water and flour. Then, reform the trench and begin the process again. Once the flour combination becomes chunky, use a bench scraper to help combine the water and flour. Repeat and keep mixing the water and flour until a dough that holds its shape forms. Form the dough into a square, wrap in plastic wrap, and place in the fridge. Chill for 30 minutes.

  Cube the sticks of butter and place in the middle of a floured cutting board, then sprinkle flour on top. Taking a floured rolling pin, pound the butter together into one mass. Keep re-flouring the rolling pin and work surface. Keep pounding the butter until it is pliable and can be folded. Then, form the butter into a square, wrap with plastic wrap, and place in fridge for 10 minutes.

  Generously flour your work surface, take the dough out of the fridge and start rolling out your sticky lean dough into a 12x12 inch square. Then, pound your butter square out so it is approximately a 6x6 inch square.

  Place the butter square in the middle of the dough square and fold the edges of the dough square so they meet in the middle. Seal the edges of the dough square and roll out the square. Roll the dough out to a 12-inch long and 5-inch wide rectangle.

  Fold the rectangle into thirds, like a letter, and then rotate it 90 degrees. Roll out again and repeat once more. Then, fold the dough back into thirds, wrap with plastic wrap, and place the dough into the fridge for 30 minutes. This allows the glutens to relax. Watch the video above to see this process!

  After 30 minutes has passed, pull the dough out of the fridge and roll out. Fold into thirds and roll once more. Repeat this once more and then fold into thirds, wrap in plastic wrap, and place in the fridge for 30 minutes. Repeat this whole rolling process once more to create 6 total folds and 720 layers of butter. Again, watch the video to see this in action!

  Fold into thirds and wrap in plastic wrap. Place the dough in the fridge for at least one hour and up to 24 hours. Next, begin preparing the beef tenderloin and mushroom duxelles.'
