babish_id: recipe-0319
name: Eggs in a Nest
image_link: null
raw_ingredient_list: 'Bread

  Salt

  Pepper

  Bacon fat

  Eggs'
raw_procedure: 'Cut some thick slices of bread and use a glass to stamp out the center of the bread. Keep the center piece of bread for mopping up afterward.

  Heat a pan and melt 45g (or 1½ Tbsp) of butter. Place bread in the pan and make sure both sides are evenly coated before plopping down and letting it sit for about 2 minutes on medium low heat.

  Place a dollop of bacon fat inside the circle before cracking one egg into the center. Crank the heat up to medium high, and let sit for 1 minute before flipping the bread and egg.

  Cook for 10-15 seconds on other side while coating with salt and pepper for taste. Also be sure to place your bread center in the pan to quickly crisp it up on either side.

  Put on a plate and enjoy!'
