babish_id: recipe-0105
name: Elote Blender Soup
image_link: null
raw_ingredient_list: '4 ears of corn

  ½ yellow onion, diced

  2 Tbsp butter, plus an additional 6 Tbsp for brown butter

  1 cup chicken stock

  Dash each of paprika, cumin, and cayenne

  ½ cup heavy cream

  1-2 Tbsp sugar, to taste

  White pepper, to taste

  Kosher salt, to taste

  3 slices crispy bacon

  2 jalapeños,

  sliced ½ cup cotija cheese'
raw_procedure: 'Start by husking 4 ears of corn and then slice all the kernels off the cob. Next finely dice ½ a small yellow onion.

  In a pan, melt 2 Tbsp butter and saute your onion until soft and then add most of your corn kernels and saute for a few minutes. Add 1 cup of chicken stock and season with paprika, cumin, and cayenne pepper. Bring to a simmer. Cook for 15 minutes or until corn is soft.

  In another saucepan, brown 6 Tbsp butter and add the rest of your corn to the butter. Saute for 3-4 minutes. Place in a small bowl and set aside.

  Add the corn and chicken stock mixture to a high powered blender and blend to combine. Once lightly blended, add ½ cup of heavy cream and 1-2 Tbsp of sugar. Add white pepper and salt to taste, and add any more cream or sugar if needed.

  Prepare your toppings: Fry up some bacon and then chop into small pieces and set aside as a garnish. Next thinly slice some jalapenos and set aside. Also add some cotija cheese to a bowl.

  Pour your blended corn mixture into a bowl and add whichever of the toppings you’d like.

  Serve and enjoy.'
