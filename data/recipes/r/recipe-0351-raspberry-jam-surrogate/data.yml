raw_procedure: 'Heat ½ pint of raspberries, ½ a cup of wine, and a splash of balsamic vinegar with a pinch of sugar and a pinch of salt in a sauce pan.

  Crush up raspberries and cook over medium heat for 30-40 minutes or until thick and jam-like.'
