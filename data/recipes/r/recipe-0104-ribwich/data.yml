babish_id: recipe-0104
name: Ribwich
image_link: null
raw_ingredient_list: 'Ribs

  Buns

  ½ onion, chopped

  Pickles, chopped

  6 bags lapsang tea

  1 beer

  Aluminum foil'
raw_procedure: 'Start by preparing your dry rub. Set aside.

  Next, prepare your wet rub. Set aside.

  Using a paper towel, remove the membrane from the back of all the ribs and then coat each side first with the wet rub and then with the dry rub. Once ribs are nicely coated, wrap them together in plastic wrap and place them in the fridge for 8-24 hours.

  Remove the ribs from the fridge, and take off the plastic wrap. Place the ribs on a baking sheet and put in the freezer for 45 minutes.

  Preheat oven to 500°F.

  Add the contents of 6 bags of lapsang tea to a baking sheet and the place a wire rack on top. Remove the ribs from the freezer and place on the wire rack. Cover the ribs and the baking sheet with aluminum foil. Tightly cover and make sure smoke can’t get out.

  Cook for 30 minutes before removing the pan, lowering the heat to 250°F, and pouring a beer into the corner of the baking sheet. Place back in the oven for 1 ½ hours.

  During the last 30 minutes of cooking, make a simple barbecue sauce by heating some vegetable oil over medium heat and then adding all the ingredients of the barbeque sauce. Whisk to combine and then let sit on a low heat to stay warm.

  Remove the ribs from the oven when they are done cooking, and coat one side with your homemade bbq sauce. Place under a broiler for 5-7 minutes or until brown and caramelized. Do the same to the other side of the ribs.

  Remove the bones from the ribs and now it’s time to plate up. Add the ribs to the bun and top with more barbecue sauce. Top with diced onion and pickles. Serve and enjoy!'
