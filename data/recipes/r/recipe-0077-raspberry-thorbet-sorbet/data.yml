babish_id: recipe-0077
name: Raspberry Thorbet Sorbet
image_link: null
raw_ingredient_list: '1 cup water

  Salt

  1 tsp Sure Jell pectin

  20 ounces raspberries

  ⅔ cup sugar, granulated'
raw_procedure: 'In a saucepan add 1 cup of water, a pinch of salt, and 1 tsp of Sure Jell pectin. Bring to a simmer and mix constantly until everything has melted. Set aside to cool at room temperature.

  In a food processor add 20 ounces of raspberries, ⅔ of a cup of granulated sugar, and the pectin mixture. Process for 30 seconds and then strain through a fine mesh sieve using a spoon and then eventually a soup ladle.

  Remove 1 cup of the mixture to cover and freeze separately. With the rest of the mixture cover and refrigerate for 8 hours.

  Add the frozen sorbet to the refrigerated sorbet and mash to combine using a potato masher.

  Add to the ice cream machine and churn for 15-25 minutes.

  Add sorbet to a pint sized container and put in the freezer for 2 hours.'
