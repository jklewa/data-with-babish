babish_id: recipe-0022
name: Inferno Wings
image_link: null
raw_ingredient_list: 'For the sauce

  10-15 fresno chili peppers

  About 40 habanero peppers

  4 cloves garlic

  1 cup white vinegar

  Pinch of salt

  Pinch of sugar

  Pinch of MSG

  For the chicken

  About 20 chicken wings

  A lot of vegetable oil for frying'
raw_procedure: 'Apply gloves and glasses before cutting the peppers on a cutting sheet or board. Remove the stem from each pepper and cut the rest of the pepper into one inch segments. You want to end up with about a pound of peppers total. I used a lot of habanero for heat, but you can try whatever combination of peppers you’d like.

  Put the peppers in a blender along with four cloves of garlic and a cup of white vinegar. Blend on low speed, stopping to push all the peppers down, then blend on high speed for at least one minute until smooth. Pour into a mason jar or safe container and cover with plastic wrap to let sit out at room temperature for three days to ferment. Little bubbles rising at the surface means it is in fact fermenting.

  Strain the sauce through not too fine a mesh strainer. We want some pepper solids to make it through so it thickens the sauce.

  Cook sauce in a sauce pan for 10-15 minutes at a bare simmer before tasting for seasoning -- adding salt to taste, a pinch of sugar to help round out the flavors, and a little MSG.

  Fill a large high-walled pot or dutch oven a quarter of the way with vegetable oil and bring to 225°F. Rinse and thoroughly pat down about 20 chicken wings, then cook in vegetable oil for about 20 minutes. Remove the (pale) wings and place on a cooling rack for at least one hour at room temperature or overnight in the fridge.

  Once chicken is cooled, put a small amount of chicken wings in oil that is heated to 400°F and fry for 10 minutes. Chicken will be sticky for the first few minutes so try to pull them apart. Repeat process until all chicken is fried, placing on cooling rack set in a rim baking sheet and keep in a low oven to keep warm.

  Take wings out of oven, the sooner after frying the better, and toss with heated sauce in a large bowl until wings are covered. Put on plate and serve with carrots, celery, and blue cheese dressing. Enjoy!'
