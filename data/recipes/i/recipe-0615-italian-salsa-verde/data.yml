babish_id: recipe-0615
name: Italian Salsa Verde
image_link: ''
raw_ingredient_list: '1 cup packed fresh parsley

  Zest and juice of one lemon

  2 Tbsp capers, drained

  Splash of white wine vinegar

  2 anchovies, finely minced

  2-3 cloves fresh garlic, roughly chopped

  1/½ cup high quality olive oil

  Chili flakes

  Salt

  Black pepper'
raw_procedure: 'Combine the ingredients in a food process or immersion blender bowl. Chop everything up, but don’t totally puree it so that the sauce has some texture.

  Taste for seasoning and add salt/pepper as needed.'
