name: Vinegar Based BBQ Sauce
image_link: null
raw_ingredient_list: '1 ½ cups apple cider vinegar

  Juice of ½ a lemon

  1 tsp - 1 Tbsp cayenne pepper (depending on your spice tolerance)

  1 tsp - 1 Tbsp hot sauce (depending on your spice tolerance)

  Salt

  Pepper'
raw_procedure: Combine all the ingredients, whisk together and then transfer to a squeeze bottle for easy distribution.
