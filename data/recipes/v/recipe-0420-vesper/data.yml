babish_id: recipe-0420
name: Vesper
image_link: null
raw_ingredient_list: '3 ounces Gordon’s gin

  1 ounce vodka

  1/2 ounce Kina Lillet

  1 lemon peel'
raw_procedure: In a cocktail shaker filled with ice, combine gin, vodka, and lillet.  Shake thoroughly, and double-strain into a chilled martini glass.  Twist the lemon peel to release its oils, rub around the rim of the glass, and place in the drink.
