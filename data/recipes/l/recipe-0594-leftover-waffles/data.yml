babish_id: recipe-0594
name: Leftover Waffles
image_link: ''
raw_ingredient_list: 'For the Stuffing Waffle:

  Leftover stuffing (as much as you can press into your waffle iron)

  For the Mashed Potato Waffle (1 waffle):

  2 cups leftover mashed potatoes

  3 ounces cheddar cheese, grated

  1 egg

  For the Sweet Potato Waffle:

  2 cups leftover sweet potatoes

  1 egg

  2 Tbsp all purpose flour'
raw_procedure: 'Preheat your your waffle iron and spray with with cooking spray.

  To make a stuffing waffle, spread a layer of stuffing onto the bottom plate of the waffle iron. Press down and cook as normal.

  To make a mashed potato waffle, combine 2 cups leftover mashed potatoes with 1 beaten egg and 3 ounces grated cheddar cheese. Pour mixture onto waffle iron and cook as normal.

  To make a sweet potato waffle, combine 2 cups leftover sweet potatoes with 1 beaten egg and 2 Tbsp all purpose flour. Pour mixture onto waffle iron and cook as normal.

  I recommend serving the waffles with leftover turkey and cranberry sauce, topped with some gravy.'
