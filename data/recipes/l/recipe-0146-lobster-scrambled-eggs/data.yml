babish_id: recipe-0146
name: Lobster Scrambled Eggs
image_link: null
raw_ingredient_list: 'Lobster tail

  3 eggs

  4-5 chives, finely minced

  2 Tbsp butter

  2-3 Tbsp sour cream

  Salt

  Pepper'
raw_procedure: 'Start by boiling a lobster tail for about 6 minutes. Remove from boiling water and immediately place into a bowl of ice cold water.

  Remove lobster from the cold water, drain it out, and remove from the shell using scissors. Also be sure to remove the vein as well. Chop lobster meat into tiny pieces.

  Beat 3 eggs together and combine with 4-5 finely minced chives.

  In a large non stick pan add 2 Tbsp of butter. Once melted, add your chopped lobster and cook for 30 seconds before adding your eggs and chives mixture.

  Cook eggs until they are just barely where you want them and then add 2-3 Tbsp of sour cream. Salt and pepper to taste. Mix to combine.

  Serve and enjoy!'
