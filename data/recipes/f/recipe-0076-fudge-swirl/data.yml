babish_id: recipe-0076
name: Fudge Swirl
image_link: null
raw_ingredient_list: '⅔ cup of milk

  1 ½ cups granulated sugar

  Salt

  ⅓ cup cocoa powder

  3 ounces unsweetened chocolate

  4 Tbsp unsalted butter'
raw_procedure: For the fudge, add ⅔ cup of milk, 1 ½ cups granulated sugar, a pinch of salt to a pot. Whisk to combine and just bring to a boil. Sift in ⅓ of a cup of cocoa powder. Whisk again to combine and then kill the heat and add 3 ounces of unsweetened chocolate. Cover with a pan lid and let melt for 3 minutes before adding 4 Tbsp unsalted butter. Whisk to combine, add to a bowl and let cool to room temperature.
