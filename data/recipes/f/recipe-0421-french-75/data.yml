raw_ingredient_list: '1 ounce gin

  1/2 ounce fresh lemon juice

  2 ounces champagne (or sparkling white wine)

  1 lemon peel'
raw_procedure: In a cocktail shaker filled with ice, combine gin and lemon juice. Shake thoroughly.  Strain into a chilled champagne coupe glass, top with champagne, and garnish with lemon peel.
