babish_id: recipe-0558
name: Frothed Milk - French Press
image_link: ''
raw_ingredient_list: Milk
raw_procedure: 'Heat up the milk to 145 degrees Fahrenheit and pour directly into your french press. Froth the milk using the metal filter by jamming it up and down a few times. This will produce steamed milk and foam that much more closely resembles what you would get with a steam wand than most other at home solutions.

  Swirl the milk, tap it on the counter, and let it rest for about 30 seconds. This will get rid of any larger bubbles and makes the foam nice and glossy.'
