name: Fried Rice
image_link: null
raw_ingredient_list: 'As needed vegetable oil

  1 cup mushrooms of choice (we used cremini and enoki), washed and sliced

  1 clove garlic, minced

  1.5 tsp freshly grated ginger

  1 carrot, finely chopped

  1 small onion or ½ large onion, finely chopped

  ½ cup frozen peas

  1 green onion, finely sliced

  2 halved bunches Baby Bok choy

  2 tsp sesame oil

  1 Tbsp soy sauce

  1.5 tsp mirin

  1 Tbsp rice vinegar

  1 egg

  To taste kosher salt

  To taste freshly ground black pepper

  Optional: garnish with spicy chili crisp'
