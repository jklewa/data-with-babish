name: French Press Coffee
image_link: null
raw_ingredient_list: Coffee, coarse ground
raw_procedure: 'Grind coffee beans to a coarse texture, similar to kosher salt. Remember that it’s a 1:12 ratio, so for every 1 gram of coffee you use, use 12 grams of water.

  Add ground coffee to the french press. Heat water to 200°F (just before boiling) and pour over the grounds. Make sure that the grounds and water are well combined.

  Let the grounds soak for 4 minutes before pushing down the plunger. Pour and serve!'
