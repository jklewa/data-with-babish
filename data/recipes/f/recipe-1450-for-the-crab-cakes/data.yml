  1 tbsp ginger, grated

  1 tbsp cilantro

  1 large egg, beaten

  1 tbsp lime juice

  1 tsp lime zest

  1 tsp fish sauce

  1 tsp kosher salt

  1 tsp freshly ground black pepper

  1 cup panko breadcrumbs

  2 Tbsp vegetable oil'
