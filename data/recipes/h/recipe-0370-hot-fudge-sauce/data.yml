babish_id: recipe-0370
name: Hot Fudge Sauce
image_link: null
raw_ingredient_list: '4 Tbsp butter

  ½ cup cocoa powder

  ⅔ cup chocolate chips

  2 cups sugar

  1 can sweetened condensed milk'
raw_procedure: 'In a saucepan, combine butter, cocoa powder, chocolate chips, sugar, and condensed milk over heat and bring to a bare simmer.

  Cook mixture for about 7 minutes or until a beautiful chocolate fudge sauce forms. Pour sauce into glass mason jar and set aside. Note: this mixture may need to be microwaved to become pourable again after it has cooled and solidified.'
