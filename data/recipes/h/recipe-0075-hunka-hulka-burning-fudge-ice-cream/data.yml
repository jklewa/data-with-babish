babish_id: recipe-0075
name: Hunka Hulka Burning Fudge Ice Cream
image_link: null
raw_ingredient_list: '1 ½ cups heavy cream

  1 ½ cups milk

  ½ cup and 2 Tbsp sugar

  ⅓ cup light corn syrup

  5 egg yolks

  3 Tbsp cocoa powder

  1 Tbsp instant coffee

  Salt

  1 Tbsp vanilla extract

  3 ounces unsweetened chocolate, chopped'
raw_procedure: 'In a pot add 1 ½ cups of both heavy cream and milk, along with ½ a cup of sugar, and ⅓ of a cup of light corn syrup. Whisk to combine and bring to 175°F.

  In a bowl add 5 egg yolks and 2 Tbsp of white sugar. Whisk to combine.

  Remove your milk and heavy cream mixture from the heat and SLOWLY add 1 cup to your egg mixture. If you do it too fast, it’ll cook the eggs, so again do it SLOWLY.

  Add that back to the pot with the rest of the milk and heavy cream mixture and bring the whole thing to 185°F. Whisk constantly and then add 3 Tbsp of cocoa powder along with 1 Tbsp of instant coffee, a pinch of salt, and 1 Tbsp vanilla extract.

  Add 3 ounces of chopped unsweetened chocolate and whisk to combine.

  Add to a bowl and let cool down to room temperature. Cover and refrigerate for 8 hours.

  For the fudge, add ⅔ cup of milk, 1 ½ cups granulated sugar, a pinch of salt to a pot. Whisk to combine and just bring to a boil. Sift in ⅓ of a cup of cocoa powder. Whisk again to combine and then kill the heat and add 3 ounces of unsweetened chocolate. Cover with a pan lid and let melt for 3 minutes before adding 4 Tbsp unsalted butter. Whisk to combine, add to a bowl and let cool to room temperature.

  Add ice cream mixture to the ice cream machine and churn for 20-30 minutes until it has lightened in color and resembles soft serve.

  Add ice cream to a loaf pan and then cover with fudge and top with chocolate chunks. Mix to combine.

  Add ice cream to a pint sized container and put in the freezer for a 2-4 hours.'
