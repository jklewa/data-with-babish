babish_id: recipe-0388
name: Homemade Raisinets
image_link: null
raw_ingredient_list: '3 bars of chocolate

  Raisins (and other dried fruits, if you want)'
raw_procedure: 'Fill a pot about ¼ full of water and bring to a boil. Once boiling, reduce to a simmer. Place a heat safe mixing bowl on top so that the water is not touching the bottom of the bowl.

  Break 2 of the 3 chocolate bars into chunks and place into the bowl above the simmering water. Stir until fully melted and approximately 115℉. Remove from heat.

  Break apart the remainder of the chocolate and add it to the bowl. Stir until melted and the temperature will lower to about 82℉.

  Place bowl back on boiler and heat back up to 90℉. Then, remove from heat.

  To test your chocolate, take a knife and dip it in the chocolate and place the knife in the fridge for a few minutes. Take the knife out and look at the chocolate. If the chocolate is smooth, glossy, and non streaky, it was tempered correctly.

  Take the raisins (or dried fruit) and coat in the chocolate. Place the chocolate coated raisins (or dried fruit) on a parchment paper covered sheet and set aside to harden.

  Once hardened, scrape the little raisinettes off of the sheet and enjoy.'
