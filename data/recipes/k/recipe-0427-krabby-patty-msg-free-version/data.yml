babish_id: recipe-0427
name: Krabby Patty (MSG-Free Version)
image_link: null
raw_ingredient_list: '3 dried shiitake mushrooms

  1 Tbsp bonito flakes

  1/2 ounce dried kombu

  1 dried anchovy

  1/2 cup pureed sun-dried tomatoes

  1 Tbsp yellow miso

  1/2 cup shredded parmesan'
raw_procedure: 'Oven-dry tomatoes at 200°F for about 90 minutes on a nonstick baking sheet. In a spice grinder, grind mushrooms, bonito, kombu, and anchovy to a fine powder and set aside. Combine sun-dried tomato with equal parts ketchup, and 1 tablespoon miso with 1/4 cup mustard. Arrange parmesan in 4 flat piles on a nonstick surface (like a Silpat), and bake at 350°F for about 15 minutes, or until lightly browned and crisp.  Slow-cook sliced onions with a bit of olive oil for 30 minutes or until thoroughly caramelized.

  Cook burgers as described above, and once removed from heat, place on a plate and sprinkle with a light dusting of the mushroom powder mix.  Toast the buns in the remaining burger fat.  Let patties rest for 2 minutes before assembling the burgers in the following order: onions, tomato, ketchup, mayo, cheese crisp, lettuce.'
