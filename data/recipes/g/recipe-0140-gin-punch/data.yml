babish_id: recipe-0140
name: Gin Punch
image_link: null
raw_ingredient_list: '5 oranges

  5 lemons

  2 blood oranges

  1 ⅓ cup sugar, divided

  3 cups water, divided

  1 bunch of sage

  2 cups Lapsang tea

  3 cups gin

  ½ cup triple sec'
raw_procedure: 'Start by peeling 1 whole orange and 1 whole lemon. Place them in a bowl, and add ⅓ cup of sugar. Cover, mix, and let sit at room temperature for 24 hours.

  Strain mixture through a fine mesh sieve and smash down with the back of a spoon. Reserve the syrup and set aside.

  Add 1 cup each of water and sugar to a pot along with fresh sage that you’ve lit on fire for 2-3 seconds. Once it’s been burning for 2-3 seconds, add it to the sugar and water mixture. Bring to a boil and then let simmer for 20 minutes. Then turn off the heat, cover and let sit for 1 hour. Strain through a fine mesh sieve and set aside.

  Use boiling water to make 2 cups of Lapsang tea.

  In a large bowl, combine your sugar mixture along with the Lapsang tea and the smoked sage syrup. Add 3 cups of gin and ½ cup of triple sec. Mix to combine.

  Cut blood oranges, oranges, and lemons into slices and then cut those in half. Add to punch. Stir to combine

  Serve and enjoy!'
