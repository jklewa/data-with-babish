babish_id: recipe-0065
name: Graham Crackers
image_link: null
raw_ingredient_list: '4 ½ ounces whole wheat flour

  4 ounces all purpose flour

  1 ½ ounces of white granulated sugar

  1 tsp salt

  1 tsp baking powder

  1 tsp cinnamon

  1 egg

  1 ½ ounces vegetable oil

  3 ounces honey

  1 ounce milk and 2 tbsp milk'
raw_procedure: 'In a bowl, combine 4 ½ ounces of whole wheat flour along with 4 ounces all purpose flour, 1 ½ ounces of white granulated sugar, 1 tsp salt, 1 tsp baking powder, and 1 tsp of cinnamon. Whisk to combine.

  In a separate bowl combine 1 egg with 1 ½ ounces of vegetable oil, 3 ounces of honey and 1 ounce of milk. Whisk to combine and then add to the dry ingredients.

  Using a spatula, fold to combine until a rough, semi-firm dough forms. Wrap dough in plastic wrap and refrigerate for at least 1 hour.

  Divide the dough into two pieces and roll out in between two pieces of parchment paper until it’s almost as thin as possible.

  Once rolled out, peel off the top layer of the parchment paper and place on a baking sheet. Brush the whole thing down with about 2 tbsp of milk. Place in a 350°F oven for about 10 minutes before removing and cutting into graham cracker shapes. Place back in the oven for 15-20 minutes or until golden brown. Let cool for about 30 minutes.'
