babish_id: recipe-0332
name: Garbanzo Beans
image_link: null
raw_ingredient_list: '1 can of garbanzo beans

  Salt

  Olive oil

  Sweet paprika'
raw_procedure: 'Rinse and dry one whole can of garbanzo beans. Toss them in a bowl with olive oil and salt. Then spread them evenly on a parchment lined baking sheet and roast on 400° for 20-30 minutes or until brown and crisp.

  Transfer beans to a bowl and toss them with plain sweet paprika and set aside.'
