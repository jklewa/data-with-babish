babish_id: recipe-0380
name: Garlic Sauce (Toum)
image_link: null
raw_ingredient_list: '2 heads garlic

  1 cup canola oil

  ¼ cup lemon juice'
raw_procedure: 'Peel and separate the cloves of 2 heads of garlic. Puree the heads in a food processor. Once they are a paste, add ½ cup of the canola oil very slowly.

  Add the lemon juice and drizzle the remaining canola oil in very slowly. The mixture should be a thick, spreadable paste. Set aside until ready to use.'
