babish_id: recipe-0476
name: Guacamole
image_link: null
raw_ingredient_list: '4 medium avocados

  ½ jalapeno, seeded (can also be unseeded for less heat)

  ¼ Spanish onion, chopped

  Juice of half a lime

  2 Tbsp cilantro

  Salt, pepper, and cumin to taste'
raw_procedure: 'Halve the avocados and remove the pits. Score them with a butter knife and scoop the insides into a large bowl.

  Add jalapeno, onion, lime juice, and cilantro. Season with salt, pepper, and cumin to taste.

  Mash with fork until chunky but creamy'
