babish_id: recipe-0576
name: Guacamole
image_link: ''
raw_ingredient_list: '3 small ripe avocados

  1 clove fresh garlic

  ½ small red onion, minced

  1 lime

  1 tsp toasted and freshly ground cumin

  Kosher salt

  Freshly ground pepper

  ½ jalapeño , finely choped

  2 Tbsp cilantro, finely chopped'
raw_procedure: 'In a medium bowl, combine 3 small ripe avocados, 1 clove of crushed garlic, ½ of a small minced red onion, the juice from 1 lime, 1 teaspoon of toasted and freshly ground cumin, a pinch of kosher salt, a few twists of freshly ground pepper, ½ of a finely chopped jalapeño, and 2 finely chopped tablespoons of cilantro.

  Using a fork, mash the combination together until it is relatively smooth. Scrape down the sides of the bowl and cover with plastic wrap, making sure to press it down directly onto the surface to prevent browning. Place in the refrigerator for later.'
