raw_ingredient_list: '1 large or 2 medium aubergines (eggplants)

  As needed kosher salt

  3 Tbsp olive oil

  1 yellow onion

  4 garlic cloves

  ¼ tsp crushed red pepper flakes

  ½ tsp dried oregano

  2 Tbsp tomato paste

  2 (28-oz) cans hand crushed San Marzano tomatoes

  1 large sprig basil + more to garnish

  2 Cups all-purpose flour

  1 tsp kosher salt

  1 tsp freshly ground black pepper

  4 eggs, beaten

  2  Cups breadcrumbs

  1 tsp dried basil

  1 tsp dried parsley

  ½ tsp dried oregano

  As needed fry oil

  8 oz low moisture mozzarella cheese, thinly sliced

  4 oz parmesan cheese, grated

  6 slices fresh (high moisture) mozzarella'
