babish_id: recipe-0180
name: Apple Brown Betty
image_link: null
raw_ingredient_list: '½ pound brown sugar

  1 tsp ground cinnamon

  ½ tsp ground ginger

  ¼ tsp ground allspice

  ⅛ tsp ground cloves

  10 granny smith apples, cored and sliced

  Breadcrumbs

  1 stick of butter'
raw_procedure: 'In a bowl, combine ½ a pound of brown sugar with 1 tsp ground cinnamon, ½ tsp ground ginger, ¼ tsp allspice, and ⅛ tsp ground cloves. Mix to combine.

  Core and slice 10 granny smith apples.

  Butter your casserole dish and add in about half of your sliced apples.

  Sprinkle with some of your brown sugar mixture and then top that with some breadcrumbs.

  Add the rest of your apples, the rest of your brown sugar mixture, and some more breadcrumbs.

  Slice a whole stick of butter into thin slices and place them on top of the breadcrumbs so they cover the whole surface of the apple brown betty.

  Cover and bake at 375°F for 20 minutes. Uncover and bake for an additional 15 minutes.

  Let cool for 5 minutes, serve and enjoy!'
