babish_id: recipe-0201
name: Wedge Salad
image_link: null
raw_ingredient_list: '4 slices bacon, fried crisp

  3-4 Tbsp buttermilk

  1-2 Tbsp sour cream

  ¼cup full-fat mayo

  2 tsp white wine vinegar

  1-2 cloves grated garlic

  Black pepper and kosher salt

  High quality blue cheese, crumbled (to taste)

  1 head iceberg lettuce

  Chives, chopped (garnish)

  Cherry tomatoes, halved (garnish)'
raw_procedure: 'Start by browning some bacon. Once the bacon is nice and crisp, be sure to drain the bacon on a paper towel.

  For the dressing, add 3-4 Tbsp of buttermilk, 1-2 Tbsp of sour cream, ¼ cup of full fat mayo, 2 tsp of white wine vinegar, 1-2 grated cloves of garlic, salt and pepper, and then crumbled blue cheese. Once everything has been added, mix it all together.

  Cut 1 large head of iceberg lettuce into quarters.

  Chop up the bacon and fresh chives into small pieces and halve some cherry tomatoes.

  Dress the iceberg wedges with the blue cheese dressing, followed by chives, cherry tomatoes, and all of the bacon.'
