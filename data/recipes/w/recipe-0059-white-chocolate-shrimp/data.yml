babish_id: recipe-0059
name: White Chocolate Shrimp
image_link: null
raw_ingredient_list: '1 Egg

  1 cup milk

  1 cup flour

  1 cup breadcrumbs

  Shrimp, peeled and deveined

  Vegetable oil

  1 small shallot, minced

  2 Tbsp white wine

  2 Tbsp white wine vinegar

  1-2 Tbsp heavy cream

  1 cup butter, cut into chunks

  4 ounces white chocolate'
raw_procedure: 'Prepare your breading station by adding 1 egg mixed with 1 cup of milk in one bowl, 1 cup of flour in your second bowl, and 1 cup of breadcrumbs in your third bowl.

  Coat the shrimp first in your flour, followed by the egg and milk mixture, and then into your breadcrumbs. Make sure they are fully coated and then set onto a plate.

  Once all of your shrimp are coated, add vegetable oil to a pot and bring to 375°F. Add shrimp and cook each shrimp for 2-3 minutes or until golden brown. Remove from oil and set on a paper towel.

  For the butter sauce, add 1 small minced shallot to a pan along with 2 Tbsp white wine, 2 Tbsp white wine vinegar, and 1-2 Tbsp of heavy cream.

  Cook over a medium heat until almost all the liquid has entirely reduced and then turn the heat down to a low heat. Add 1 cup of butter, a few chunks at a time. Once all the butter is added, remove from the heat but keep whisking to combine until a thick smooth sauce has been created.

  For the white chocolate sauce, follow all the steps above but instead of 1 cup of butter, just add 4 ounces of butter along with 4 ounces of white chocolate. Mix to combine. If the sauce starts to break, just add a few Tbsp of heavy cream.

  Serve with the fried shrimp and enjoy!'
