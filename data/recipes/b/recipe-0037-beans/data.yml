name: Beans
image_link: null
raw_ingredient_list: 'Can of black beans

  1-2 Tbsp olive oil

  Kosher salt

  Freshly ground pepper

  1 lime'
raw_procedure: For the beans, saute drained beans with 1-2 Tbsp of olive oil over medium-high heat. Then season with Kosher salt, freshly ground pepper, the zest of one lime, and the juice of half a lime. Saute for another 30 seconds and cover to keep warm.
