babish_id: recipe-0032
name: Buttercream Icing
image_link: null
raw_ingredient_list: '6 ½ ounces egg whites

  1 cup sugar

  2 tsp vanilla extract

  4 sticks butter; softened'
raw_procedure: 'On a stovetop place a large pot of water and bring to a simmer.

  In a new stand mixer bowl combine 6 ½ ounces of egg whites, 1 cup sugar, and 2 tsp of vanilla extract. Place bowl over the large pot of simmering water and stir until it reaches 160°F. Then place in a stand mixer and mix at high speed for 5 minutes until it triples in volume and cools off. Ideally until room temperature.

  Put stand mixer on medium speed and slowly add in 4 softened sticks (room temperature) butter, half a stick at a time, and wait for it to be completely incorporated before adding the next half stick of butter.

  After that’s done, place on high speed for another minute until it is smooth and creamy.'
