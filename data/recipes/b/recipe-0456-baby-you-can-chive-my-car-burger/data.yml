babish_id: recipe-0456
name: Baby You Can Chive My Car Burger
image_link: null
raw_ingredient_list: 'Ground meat

  Feta cheese

  Kosher salt

  Pepper

  ½ cup sour cream

  ¼ cup dijon mustard

  Hamburger buns

  Minced chives'
raw_procedure: 'Make a very thin and very flat patty topped with feta cheese. Place another very thin very flat patty on top, and seal the edges to create a feta stuffed burger.

  Season with kosher salt and fresh pepper.

  Create sauce by combining ½ cup of sour cream and ¼ cup dijon mustard.

  Lightly toast buns in oil on a skillet.

  After you remove buns, add your burger to the skillet. Flip once brown and crusted.

  Put burger together, adding sour cream sauce, and some minced chives.

  Add fried pickle slices to the side thus creating Baby You Can Chive My Car Burger.'
