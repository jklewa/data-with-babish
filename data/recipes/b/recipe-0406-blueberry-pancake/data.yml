babish_id: recipe-0406
name: Blueberry Pancake
image_link: null
raw_ingredient_list: '3/4 cup milk

  1 cup all purpose flour

  1 Tbsp sugar

  1 tsp baking powder

  1/2 tsp baking soda

  1 egg

  2 Tbsp butter, melted

  1/2 cup frozen blueberries, thawed'
raw_procedure: To make pancake batter, whisk together flour, sugar, baking powder, and baking soda in a large bowl.  Add egg and cooled melted butter, and whisk until batter forms, allowing batter to remain slightly lumpy.  Pour about 3/4 cup onto a 13-inch crepe griddle and spread as necessary until batter reaches the edges of the griddle.  Top with blueberries and allow to cook until bubbles begin forming all over the pancake and edges turn glossy, and bottom has browned.  Flip, and continue to cook until fluffy and thick.  Place on a plate and cover with aluminum foil to make the pancake as flexible as possible.
