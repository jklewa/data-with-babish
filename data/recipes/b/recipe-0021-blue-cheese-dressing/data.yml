babish_id: recipe-0021
name: Blue Cheese Dressing
image_link: null
raw_ingredient_list: '1 cup mayonnaise

  ¾ cup sour cream

  Sprinkle of garlic powder

  1 Tbsp white wine vinegar

  Sprinkle of kosher salt

  Sprinkle of freshly ground black pepper

  ½ tsp white sugar

  Squeeze of lemon juice

  4 ounces crumbled blue cheese'
raw_procedure: In a medium bowl combine 1 cup of mayonnaise, ¾ cup sour cream, a sprinkle of garlic powder, 1 Tbsp white wine vinegar, big sprinkle of kosher salt, a few twists of freshly ground black pepper, ½ tsp of white sugar, and a squeeze of lemon juice. Then add about four crumbled ounces of blue cheese and mix together. Cover and refrigerate until ready to be used.
