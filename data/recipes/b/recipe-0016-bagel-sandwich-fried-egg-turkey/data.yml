babish_id: recipe-0016
name: Bagel Sandwich - Fried Egg & Turkey
image_link: null
raw_ingredient_list: '2 slices turkey

  1 egg

  2 slices cheese

  Bagel'
raw_procedure: Cut a Babish-worthy bagel and toast with butter in a frying pan. Fry an egg to your liking. Use a ring mold to cut two slices of turkey and the fried egg around the yolk. Place on bagel (turkey first, then egg, then cheese) to make the symmetrical Steven Universe sandwich. Toast the whole sandwich for no longer than 3 minutes at about 400°F, just enough to melt the cheese. Cut and enjoy!
