babish_id: recipe-0571
name: Blueberry Pie
image_link: ''
raw_ingredient_list: 'Fresh or frozen blueberries

  ½ cup sugar

  ¼ cup corn starch

  Lemon zest'
raw_procedure: 'In a small bowl, whisk together ½ cup of sugar, ¼ cup of corn starch, and the zest of one lemon. Combine this mixture with the bowl of blueberries and toss accordingly.

  Add the blueberry mixture to your standard pie crust.

  Follow the steps for the lattice pie crust above.

  Bake at 400°F for 30 to 45 minutes until deeply golden brown. Allow to cool for at least four hours before digging in.'
