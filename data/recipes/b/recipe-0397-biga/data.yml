name: Biga
image_link: null
raw_ingredient_list: '1/4 tsp yeast

  1/2 cup room temperature water

  5 ounces all purpose flour

  10 ounces all purpose flour

  1/2 tsp instant yeast

  1 1/2 tsp kosher salt

  3/4 cup room temperature water

  1/4 cup room temperature milk'
raw_procedure: 'In a small bowl, combine first yeast, water, and flour - stir until a sticky paste forms.  Scrape down the sides of the bowl, cover with plastic wrap, and let ferment at room temperature for at least 8 hours, up to 24 hours.

  Combine the biga with the remaining ingredients in the bowl of a stand mixer.  Mix for 1-2 minutes on medium speed, until the ingredients are homogenous.  Replace the paddle attachment with the dough hook, and knead on medium-high speed for 10 minutes, until dough is shiny and smooth.  Pull the dough off the hook and pour into a large oiled bowl.  Cover with plastic wrap and allow to rest for 30 minutes.

  After 30 minutes, remove the plastic wrap, oil a rubber spatula, and fold the dough onto itself 8 times, rotating the bowl so every part of the dough gets turned.  Replace the plastic wrap, rest for an additional 30 minutes, and repeat the process 2 more times.

  Preheat oven to 450°F with a pizza stone set in the center of the oven.  Turn the dough out onto an extremely liberally-floured surface.  Divide into 3 equal pieces, and roughly shape each into a 12x9” rectangle, flouring underneath if the dough sticks.  Fold the dough onto itself like a letter, resulting in a 12x3” loaf.  Repeat with remaining pieces, and place each loaf on a sheet of parchment paper cut just larger than the size of the loaves.  Dust with flour, cover with plastic wrap, and let rest for another 20 minutes.

  Remove the plastic wrap, spray down the loaves with water from a spray bottle, and slide onto the pizza stone.  Bake for 22-30 minutes, until deeply golden brown on the outside, registering 210°F inside.  Place on a wire rack and allow to cool completely before assembling the sandwich.'
