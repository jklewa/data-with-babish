raw_ingredient_list: 'First Cut (flat cut) of brisket

  4 medium carrots

  4 stalks celery

  4 medium onions

  4 cloves garlic

  Sprigs of thyme

  ¼ cup light brown sugar

  2 Tbsp tomato paste

  2 Tbsp flour (if you want to stay Kosher, substitute potato starch)

  1 ½ cups dry red wine

  1 ½ cup beef broth

  ½ cup ketchup

  1 cup crushed tomatoes

  ¼ cup white wine vinegar

  3-4 bay leaves

  1 Tbsp paprika

  1 tsp cayenne pepper (Optional)

  2 Tbsp honey

  2 Tbsp dijon mustard'
