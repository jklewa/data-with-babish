babish_id: recipe-0601
name: Bone Broth - Pressure Cooker
image_link: ''
raw_ingredient_list: '5 lbs beef bones

  1 large yellow onion

  4 carrots

  1 stalk of celery

  1 leek

  1 bunch parsley

  ½ head garlic

  2 Tbsp black peppercorns

  2 dried bay leaves

  1 Tbsp apple cider vinegar

  5-6 chicken feet'
raw_procedure: 'Clean all of the bone marrow out of the bones that you can. Marrow usually gives the broth a metallic taste when marrow is left in.

  Arrange the bones across some racks set in rimmed baking sheets.

  Drizzle with a little oil to assist with browning then roast the bones in a 400°F oven for 40 minutes to 1 hour, or until the bones are deeply browned and haven’t given up much of their fat.

  Prep the veggies: quarter 1 whole onion, peel 4 carrots and cut them in half, and cut the stalk of celery in half. Lastly, thoroughly wash and trim the leeks so they fit in the pot.

  In one big pot (as narrow and tall as you have), place the vegetables and bones in along with half a head of garlic, 2 Tbsp of peppercorns, and 2 dried bay leaves.

  Trim the claws off of 5-6 chicken feet - this helps with adding fat and gelatin to the broth.

  Fill pressure cooker with water to the max capacity with 1 Tbsp of apple cider vinegar.

  Set to high pressure for 60 minutes - but you can go as long as 4 hours. Let the pressure release naturally.

  Remove all the solid ingredients and strain (preferably through a cheesecloth).

  Portion the broth into jars. Rapidly chill them in an ice bath and then refrigerate.'
