babish_id: recipe-0349
name: Beef Stew
image_link: null
raw_ingredient_list: 'One whole chuck roast

  Olive oil

  Chopped Onion

  Chopped mushrooms

  Finely chopped carrot

  ½ cup red wine

  ½ -1 cup beef stock

  1 tsp thyme

  1 tsp rosemary

  1 tsp sage

  1 Tbsp tomato paste

  Cornstarch

  Plantains'
raw_procedure: 'Mince a whole chuck roast into nice small bite sized pieces. Brown them in a skillet in a little bit of olive oil until you get some nice color and nice fond on the bottom of the pot.

  Remove meat and set aside. Add chopped onion, chopped mushrooms, and a finely chopped carrot.

  Deglaze with ½ cup of red wine and ½ to 1 cup of beef stock.

  Add 1 tsp each of freshly chopped thyme, rosemary, and sage along with 1 Tbsp of tomato paste.

  Add beef bits back to broth, supplementing with extra broth if necessary.

  Partially cover and let simmer for 2 hours. Thicken with cornstarch at the end of cooking.'
