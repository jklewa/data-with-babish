name: Babish's Baked Rigatoni
image_link: null
raw_ingredient_list: '1 pound rigatoni noodles

  8 ounces low moisture, full fat mozzarella cheese (½ inch chunks)

  ½ pound low moisture full fat mozzarella cheese (shredded)

  16 ounces cottage cheese

  2 whole eggs

  3 ounces parmesan cheese, grated

  Nutmeg, grated

  Basil, chopped

  Tomato sauce (see above)

  Béchamel sauce (see below)'
raw_procedure: 'Boil 1 pound of ziti noodles until cooked al dente.

  In a bowl, add 16 ounces of cottage cheese, 2 whole eggs, 2 ounces of grated parmesan cheese, and optionally, add some freshly grated nutmeg. Mix accordingly.

  Add some chopped basil in bite-size pieces to the bowl and mix. Set aside for later.

  Pour 1-2 cups of tomato sauce (method above), your pan of Béchamel sauce (see below), and your cottage cheese, egg, parmesan, and basil mixture to the pasta. Stir.

  Then, add 8 ounces of low moisture full fat mozzarella cheese (½ inch chunks) and mix until all of the ingredients are evenly dispersed.

  Pour into an aluminum pan and top with 1-2 cups of tomato sauce. Top it off with ½ pound of shredded low moisture full fat mozzarella cheese and 1 oz of grated parmesan cheese.

  Cover the pan tightly with aluminum foil and place in a 350°F oven for 30 minutes.

  Once 30 minutes has passed, take the rigatoni out of the oven, uncover the pan, and place back into the oven for 15-20 minutes until browned, crispy, and bubbly around the edges.'
