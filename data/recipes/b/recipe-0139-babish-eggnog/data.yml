babish_id: recipe-0139
name: Babish Eggnog
image_link: null
raw_ingredient_list: '8 eggs

  ½ cup sugar + 2 Tbsp sugar, divided

  2 cups steaming milk

  2 whole cloves

  2 cups heavy cream

  Bourbon (to taste)

  ½ cup of white rum (to taste)'
raw_procedure: 'Start by adding 8 egg yolks to a stand mixer. Mix on high and slowly add a ½ cup of sugar until light and ribbony.

  Next, SLOWLY add 2 cups of steaming milk (you don’t want to scramble the eggs!). Once the mixture is well combined and foamy, add to a pot and add 2 cloves. Whisk constantly over a medium low heat until you reach 160°F.

  Add 2 cups of cold heavy cream and remove from heat. Whisk thoroughly to combine.

  Strain into a bowl using a fine mesh sieve. Cover and place in fridge for 4 hours or overnight.

  Add 8 egg whites to a stand mixer and mix on high while adding 2 Tbsp of sugar. Mix until stiff peaks have formed.

  Remove mixture from the fridge and add bourbon and rum (to taste). Once you’ve reached your optimal taste, gently fold in egg whites.

  Serve in a glass and top with grated nutmeg.'
