name: Buddy's Breakfast Dessert Pasta
image_link: null
raw_ingredient_list: 'Spaghetti

  Tomato sauce

  Chocolate chips

  M&Ms

  1 fudge Pop-Tart

  Marshmallows

  Maple syrup

  Caramel sauce

  Chocolate sauce'
raw_procedure: 'Boil water and cook spaghetti according to package.

  Toss pasta in tomato sauce.

  Top pasta with a handful of chocolate chips and a handful of M&Ms. Crumble the fudge poptart on top. Top the pasta with a handful of marshmallows, a glug of syrup, some caramel sauce, and some chocolate sauce.'
