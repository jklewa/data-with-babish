babish_id: recipe-0225
name: Biscuits
image_link: null
raw_ingredient_list: '675g flour

  2 Tbsp baking powder

  1 Tbsp baking soda

  1 tsp table salt (or 2 tsp kosher salt)

  1 stick butter (8 Tbsp)

  2 cups buttermilk'
raw_procedure: 'In a large bowl add 675g of flour, 2 Tbsp of baking powder, 1 Tbsp of baking soda, and 1 tsp of table salt (or 2 tsp kosher salt). Sift all of that together into another bowl.

  Next add 1 stick of butter (cut into Tbsp sized pieces, fresh out of the fridge). Using 2 butter or steak knives, cut the butter into the flour until the butter is the size of peas.

  Add 2 cups of buttermilk and start folding it all together using a rubber spatula. Don’t over-mix or over-knead the dough.

  Flour your work surface and knead your dough until it forms a cohesive ball. Refrigerate for 10 minutes before rolling out and using a biscuit cutter to make your biscuits. Make sure your dust your cutter with flour.

  Preheat oven to 400°F.

  Place biscuits on a parchment-lined baking sheet and brush tops with melted butter. Place in the oven for 15 - 20 minutes or until golden brown and then place on a wire rack to cool.'
