babish_id: recipe-0132
name: Buckwheat Blini for Salmon Mousse and Salmon Roe
image_link: null
raw_ingredient_list: '75 grams all purpose flour

  60 grams buckwheat flour

  15 grams sugar

  5 grams yeast

  1 cup whole milk

  Salt

  2 eggs

  2 Tbsp melted butter (not hot, just melted)'
raw_procedure: 'In a large bowl combine: 75 grams all purpose flour, 60 grams buckwheat flour, 15 grams sugar, and 5 grams yeast. Whisk to combine.

  Add 1 cup whole milk (heated to 110°F) and a pinch of salt. Whisk until smooth. Cover and let sit for an hour.

  Lightly beat together 2 eggs and then add them to the batter. Whisk to combine before adding 2 Tbsp of melted butter. Make sure the butter is just melted, not hot, and then whisk to combine. Pour half of your batter into a squeeze bottle. Don’t fill it up all the way because it is a yeasted dough and it will rise in the squeeze bottle.

  Melt some butter on a pan over medium heat. Then, using the squeeze bottle, make some blinis the size of silver dollar pancakes. Cook about a minute on each side and set aside to cool.'
