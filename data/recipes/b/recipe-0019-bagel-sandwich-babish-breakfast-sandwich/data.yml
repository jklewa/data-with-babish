babish_id: recipe-0019
name: Bagel Sandwich - Babish Breakfast Sandwich
image_link: null
raw_ingredient_list: '1 pound ground pork

  1 Tbsp chopped sage

  1 Tbsp chopped thyme

  Sprinkle ogarlic powder

  Sprinkle onion powder

  Sprinkle red chili flakes (optional)

  Sprinkle chili powder

  Sprinkle smoked paprika

  Maple syrup or 2 Tbsp brown sugar

  Generous pinch of Kosher salt

  Few twists of freshly ground black pepper

  1 egg

  1 slice pepper jack cheese

  Bagel'
raw_procedure: 'In a large bowl, combine pork, sage, thyme, garlic powder, onion powder, red chili flakes, chili powder, smoked paprika, brown sugar or syrup, kosher salt, and pepper. Massage with hands until homogenous.

  Shape into patties and cook, keeping in mind it will shrink whilst cooking.

  Place meat on bottom half of bagel, then egg patty, then cheese and toast in a 400°F oven for no more than 3 minutes to melt the cheese. Enjoy!'
