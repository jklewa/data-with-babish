babish_id: recipe-0017
name: Bagel Sandwich - Canadian Bacon & Egg
image_link: null
raw_ingredient_list: '1 or 2 pieces canadian bacon

  1 egg

  1 slice cheese

  Bagel'
raw_procedure: Into a ring mold set in a non-stick pan goes a teensy bit of butter and barely beaten egg. Turn down the heat to low and cover with a heat-safe dish like a ramekin to trap steam and let the egg cook thoroughly. Remove ring mold and flip egg to let both sides get some color. Remove egg patty from heat and place on top of toasted bagel bottom above Canadian bacon. Cut the sandwich in half, take off the top bun, place cheese on top, put top bun back on, then toast. Then a moment of silence for the cross section and cheese pull. Enjoy!
