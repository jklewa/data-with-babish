name: Burger Patties
image_link: null
raw_ingredient_list: '3 pounds of short rib

  3 pounds of chuck roast'
raw_procedure: 'Cut meat into small cubes and spread out evenly on a parchment lined baking sheet. Place baking sheet in freezer for 15 minutes or until firm around the edges. Also place blade of food processor in the freezer.

  In batches, add beef to food processor and pulse until you have a nice pebbly grind.

  Be careful not to overgrind your beef.'
