babish_id: recipe-0235
name: Blended Banana Ice Cream
image_link: null
raw_ingredient_list: '2 bananas, frozen

  Whole milk

  2 tbsp cocoa powder (or more to taste)'
raw_procedure: 'Start by slicing up two bananas into 1-2 inch slices and place them on a baking sheet to freeze for about two hours or until frozen.

  Put your frozen banana slices into a blender and start to blend them. You want to liquify them, so add whole milk in, a little at a time, until thick. Once it’s thick add 2 Tbsp of cocoa powder along with a little more milk and blend until creamy.

  Pour into a bowl and cover directly plastic wrap (push it down so it is against the liquid) and freeze for four hours, or overnight.

  Serve and enjoy!'
