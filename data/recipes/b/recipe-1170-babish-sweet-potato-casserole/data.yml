raw_ingredient_list: '~4 lbs potatoes, peeled + cut into 1” cubed

  2 cinnamon sticks

  5 oz unsalted butter, cubed + more for greasing

  3 egg large yolks

  4½ oz light brown sugar

  2 oz maple syrup

  4 oz creme fraiche

  1½ tsp kosher salt

  ½ tsp ground cinnamon

  ¼ tsp freshly grated nutmeg

  2 tsp vanilla paste

  Pecan Streusel (see recipe below)

  Marshmallow Topping (see recipe below)'
