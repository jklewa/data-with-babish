name: Barney Stinson’s Hangover Fixer Elixir
image_link: null
raw_ingredient_list: '1 ounce Funyuns

  1 banana, peeled

  1 knob ginger, peeled and sliced

  2 tablespoons bacon grease

  16 ounces Surge'
raw_procedure: Combine all ingredients in a blender.  Blend on high speed until completely smooth, and pour directly down the drain because it tastes like garbage and doesn’t work.
