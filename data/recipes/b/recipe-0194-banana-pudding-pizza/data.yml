babish_id: recipe-0194
name: Banana Pudding Pizza
image_link: null
raw_ingredient_list: '3 Tbsp cornstarch

  ¾ cup plain white sugar

  2 ½ cups whole milk

  3 beaten egg yolks

  1 Tbsp butter

  2 Tbsp vanilla paste

  Bananas

  Pepperoni'
raw_procedure: 'In a bowl combine 3 Tbsp of cornstarch with ¾ cup of plain white sugar and whisk to combine. To the same bowl add 2 ½ cups of whole milk and whisk until everything is incorporated.

  Add mixture to a pot and cook over a medium low heat stirring constantly.

  When mixture is hot, remove ¼ of a cup and SLOWLY combine that with 3 beaten egg yolks in a separate bowl. Once that is combined, SLOWLY add that mixture back to the pot and whisk until the mixture has thickened and coats the back of a spoon.

  Remove from heat and place in a separate bowl. Add 1 Tbsp of butter and 2 tsp of vanilla paste. Whisk to combine. Let cool for about 30 minutes before covering with plastic wrap, pressing directly onto the surface of the pudding, and placing in the fridge until it sets.

  Preheat your oven to 500°F.

  Make your pizza dough, and top with sauce, mozzarella cheese, and pepperoni.

  Cook for about 10 minutes or until crust is golden brown, and let sit to cool for about 5 minutes.

  Remove pudding from fridge. Slice up some bananas and add to your pudding mixture. Stir to combine and then add to the top of the pizza.

  Serve and enjoy!'
