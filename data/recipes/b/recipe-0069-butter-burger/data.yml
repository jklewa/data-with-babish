babish_id: recipe-0069
name: Butter Burger
image_link: null
raw_ingredient_list: '1 ½ cups heavy cream

  1 ½ cups milk

  ½ cup and 2 Tbsp sugar

  ⅓ cup light corn syrup

  5 egg yolks

  3 Tbsp cocoa powder

  1 Tbsp instant coffee

  Salt

  1 Tbsp vanilla extract

  3 ounces unsweetened chocolate, chopped'
raw_procedure: 'Start by making your own butter. To a food processor add your non ultra pasteurized heavy cream and run until the fats separate, so about 2 minutes. Strain your butter in multiple cheese cloths, lightly squeezing so the liquid gets out.

  Place butter in a bowl and top with ice cold water. Massage the butter to get more of the whey out and repeat this process until the water runs almost clear. Remove from the water and season with some salt. Mix together and shape into a ball. Set aside.

  Roughly chop 2 small white onions and add them to a pot and slowly cook in ¼ cup of olive oil over a medium heat until they are soft. Add 2 Tbsp of homemade butter along with ⅓ cup dry white wine. Cover and let cook for 10 minutes.

  Remove lid and give the onions a quick stir before adding ⅓ of a cup of beef broth and some black pepper. Bring to a simmer, lower the heat and cover for 10 minutes. Remove lid and let simmer for 20 minutes before placing onion jam in a bowl and setting aside.

  Take your ¼ pound of beef and place it in between 2 pieces of parchment paper. Use a plate to flatten and then add to a ripping hot cast iron skillet. Season one side with salt and pepper.

  Once you’ve flipped the burger, add your yellow american cheese and some of the onion jam. Add 1 Tbsp of water to the pan and then cover for 2 minutes to let the cheese steam.

  Add 1-2 Tbsp of butter to your hamburger buns and then top with the burger.

  Serve and enjoy!'
