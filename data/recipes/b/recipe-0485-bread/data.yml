babish_id: recipe-0485
name: Bread
image_link: null
raw_ingredient_list: '1 cup room temperature water

  ½ tsp instant yeast

  5 ounces whole wheat flour (approximately 1 ¼ cup)

  5 ounces bread flour (approximately 1 ¼ cup)

  19 ¼ ounces bread flour (approximately 4 ¾ cup)

  1 ⅓ cup room temperature water

  2 ½ ounces rye flour (approximately ⅔ cup)

  2 Tbsp honey'
raw_procedure: 'Wake up super early because that’s the first rule of bread baking. In a bowl, add yeast to room temperature water and combine. Allow yeast to dissolve. Add 5 ounces of bread flour and whole wheat flour. Combine until a sloppy dough forms.

  Cover the dough and allow to sit at room temperature for 5-16 hours. You can get some sleep in the meantime.

  Add the rest of the bread flour, additional room temperature water, rye flour, and honey to the dough. Mix lightly by hand. Then, using a stand mixer with a kneading hook, allow dough to be kneaded for 15 minutes on a low speed.

  Lightly oil a bowl. Dump the kneaded dough into the bowl, pat it down with your fingers, and cover. Allow dough to rise for 2 hours or until it has tripled in size.

  Heavily flour your workspace. Dump the dough out onto the workspace. Pull the edges into the center of the dough to create a smooth top for your bread.

  Line a colander with cheesecloth and dust cloth lightly with flour. Place dough smooth side down. Cover with aluminum foil and let rest for 45 minutes or until it has almost doubled in size.

  Preheat oven to 450°F and place a pizza stone into oven.

  Lightly flour a parchment-lined pizza peel. Place pizza peel on top of the colander and invert so the dough is now lying on top of the parchment paper on the pizza peel.

  Get your razor blade from the Goodfellas pasta episode and score the bread. Spritz the dough with water.

  Using the pizza peel, transfer the dough to the pizza stone in the preheated oven. Allow to bake for 35-45 minutes or until browned. Tap the outside of the loaf cause that seems like something you’re supposed to do with bread. Allow the loaf to cool for at least 2 hours.'
