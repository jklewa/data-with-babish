name: Napoleon Cakes
image_link: null
raw_ingredient_list: 'Custard (aka Creme Patisserie)

  Decorative Icing

  1 sheet of puff pastry'
raw_procedure: 'Preheat oven to 450℉.

  Take puff pastry and cut into 3 equal pieces. Bake for about 6 minutes at 450℉ or until light and fluffy. Remove from the oven and place another baking sheet on top of the pastry to weigh it down. Put the pastry back in the oven for an additional 4-5 minutes or until thin and crisp. Allow to cool completely.

  Take creme patisserie (aka custard) and spread on top of one of the pastry squares. Place another pastry square on top and spread more custard.

  Taking the final pastry square, spread the plain icing on top. Use an offset spatula to smooth.

  Using a drinking glass to hold a pastry bag with a small round tip, spoon the chocolate icing into the bag.

  Pipe chocolate icing onto top layer in long, straight lines across the length of the pastry. Drag the tip of a toothpick back and forth across the top of the icing, creating a decorative flair.

  Place the remaining layer on top of the other layers. Plate up on a nice serving plate and hack yourself off a piece.'
