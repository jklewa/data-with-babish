babish_id: recipe-0498
name: NYC-Style Pizza
image_link: null
raw_ingredient_list: 'Pizza Dough

  One 28-ounce can whole peeled tomatoes

  2 medium garlic cloves, minced

  1 tsp dried oregano

  ½ tsp red pepper flakes

  ½ tsp dried basil

  ¼ cup semolina flour

  8 ounces whole-milk mozzarella, shredded'
raw_procedure: 'Remove the dough from the refrigerator and divide into two pieces (you only need half the dough for one pizza). Wrap each piece of dough in plastic wrap and let rest at room temperature for 1 hour. While the dough rests, prepare the sauce. In a food processor, combine the tomatoes, garlic, oregano, red pepper flakes, basil and the remaining 1 teaspoon salt. Process until smooth, then transfer to a saucepan. Bring to a gentle simmer over medium-low heat, then cover and cook for 30 minutes.

  Place a pizza stone in the oven and preheat to 550°F (or its highest setting) for 1 hour.

  Dust a pizza peel with half of the semolina flour. Generously flour a work surface and place one of the doughs on top. Pressing gently using your fingertips, push the dough out to form a disc, leaving the edge slightly thicker.  Once the dough is about 8 inches wide, pick it up and drape it over your knuckles, letting gravity stretch out the dough. Pass the dough hand-over-hand, until it’s stretched into about a 14-inch round. Place the dough on a pizza peel and reshape into a circle, if needed, leaving the edge slightly thicker. Ladle about ½ cup of sauce onto the dough and spread around until evenly coated. Scatter half of the mozzarella over the top, making sure not to get any sauce or cheese on the edge of the dough crust. Slide the pizza onto the preheated pizza stone and bake until the crust is well browned and the cheese is bubbly and browned in spots, about 12 minutes. Use the pizza peel to remove the pie and transfer to a large cutting board or pizza pan. Slice into 6 pieces and
  serve.'
