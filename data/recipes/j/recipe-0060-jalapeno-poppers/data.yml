babish_id: recipe-0060
name: Jalapeno Poppers
image_link: null
raw_ingredient_list: 'Jalapenos, halved and hallowed

  8 ounces cream cheese

  8 ounces pepper jack cheese, shredded

  1 Egg

  1 cup milk

  1 cup flour

  1 cup breadcrumbs

  Vegetable oil'
raw_procedure: 'Start by halving and hallowing your jalapenos. In a bowl combine 8 ounces of cream cheese with 8 ounces of shredded pepper jack. Mix to combine, and then scoop the mixture into each jalapeno half.

  Prepare your breading station by adding 1 egg mixed with 1 cup of milk in one bowl, 1 cup of flour in your second bowl, and 1 cup of breadcrumbs in your third bowl.

  Add your jalapenos and to the flour mixture and then place them on a wire rack and let sit for 10 minutes.

  Next, add them to the egg and milk mixture followed by the bread crumb mixture and then let sit on a wire rack for 45 minutes. Repeat this so they are coated twice before.

  Preheat a pot with vegetable oil to 375°F and add jalapenos. Cook for 2-3 minutes before removing and placing on a wire rack to cool.

  Serve and enjoy!'
