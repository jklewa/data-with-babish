babish_id: recipe-0142
name: Jerry Thomas’ Baltimore Eggnog
image_link: null
raw_ingredient_list: '2 ounces cognac

  1 ounce rum

  ½ ounce madeira rainwater wine

  ½ ounce simple syrup

  1 egg

  Ice

  Milk (as much as you’d like)

  Nutmeg'
raw_procedure: 'In a cocktail shaker, add 2 ounces of cognac, 1 ounce of rum, ½ an ounce of madeira rainwater wine, ½ an ounce of simple syrup and 1 egg. Shake to combine and strain into a class.

  Add as much milk as you’d like, and top with freshly grated nutmeg.'
