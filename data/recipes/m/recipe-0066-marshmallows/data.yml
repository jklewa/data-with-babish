babish_id: recipe-0066
name: Marshmallows
image_link: null
raw_ingredient_list: '½ cup water

  3 packets powdered gelatin

  1 ½ cups white granulated sugar

  ½ cup water

  1 cup light corn syrup

  2 tsp vanilla extract'
raw_procedure: 'In a stand mixer, add ½ a cup of water along with 3 packets of powdered gelatin. Whisk to combine.

  In a small saucepan, combine 1 ½ cups white granulated sugar along with ½ cup of water, and 1 cup of light corn syrup. Mix to combine and then bring the mixture to a temperature of 240°F.

  With your whisk attachment attached, slowly start your stand mixer and add the contents from your saucepan SLOWLY. Mix for about 5 minutes, slowly increasing your speed to high.'
