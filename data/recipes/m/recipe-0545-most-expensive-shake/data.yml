babish_id: recipe-0545
name: Most Expensive Shake
image_link: null
raw_ingredient_list: '1 ½ cups high-quality milk

  1 ½ cups high-quality heavy cream

  6 Tbsp sugar

  1/3 cup corn syrup

  Tahitian vanilla beans

  Kosher salt

  6 local cage-free eggs

  1/4 cup granulated sugar

  12 ounces high-quality, high butterfat milk

  3 ounces Devonshire clotted cream

  Madagascar vanilla beans

  Edible gold leaf

  Louis XIII Cognac (or other high-quality spirit)

  Donkey caramel sauce (for garnish)

  Chocolate shavings (for garnish)'
raw_procedure: 'Combine 1 ½ cups each of the best milk and heavy cream that can be found in a large saucepan. Add 6 tablespoons of sugar and 1/3 cup corn syrup. Split Tahitian vanilla beans down the side with a paring knife and use the back of the knife (or a small spoon) to scrape out the beans. Deposit both the beans and the casing into the milk and cream mixture. Add a pinch of kosher salt. Put the saucepan on medium-low heat until it reaches 175°F.

  Separate the yolks from 6 cage-free eggs and place them into a medium bowl with a moist paper towel underneath the bowl. Add 1/4 cup granulated sugar and whisk until combined. Remove cream mixture from the saucepan on the stove. Whisking constantly, slowly ladle in one full ladle of the hot mixture into the eggs to temper them. Then, dump egg mixture into the saucepan and cook over medium-low heat, whisking constantly until thickened and at 185°F. Be sure not to rush over too high of a flame or there will be little dots in the custard and scrambling on the bottom of the pan. Once it reaches temperature, pour immediately into a heatproof bowl and let the bowl sit for 15-20 minutes until it stops steaming. Cover with plastic wrap, pressing the wrap directly onto the surface of the custard. Place into the fridge for 4-24 hours.

  Once the custard is chilled, dig out pieces of the vanilla pod, and churn custard using method of choice. The custard should be 21°F, which can take 15-30 minutes depending on the device. Start taking its temperature when the mixture starts to resemble soft serve. Dump into a pre-frozen metal container, such as a loaf pan, and spread out evenly. Cover with plastic wrap and put in the freezer for at least 4 hours.

  Add 12 ounces of high-quality high butterfat milk and 3 ounces of Devonshire clotted cream to a blender. Dig out Madagascar vanilla beans from pods and add to blender. Scoop out approximately 18 ounces of the homemade Tahitian vanilla ice cream and top with edible gold leaf before dumping into the blender. Very gently pour in the bare minimum amount of Louis XIII (or other high-quality spirit). Blend for about 30 seconds until completely smooth and studded with bits of gold. Pour into a milkshake glass. Top with whipped cream, edible gold, a maraschino cherry, and donkey caramel sauce.'
