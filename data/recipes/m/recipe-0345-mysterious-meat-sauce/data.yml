babish_id: recipe-0345
name: Mysterious Meat Sauce
image_link: null
raw_ingredient_list: '1 cup diced onion

  1 pound ground beef

  4 ounces tomato paste

  ¼ tsp ground cloves

  ¼ tsp cinnamon

  ¼ tsp allspice

  ¼ tsp cayenne pepper

  ¼ tsp ground cumin

  ¼ tsp paprika

  ¼ tsp garlic powder

  2 pinches salt and pepper'
raw_procedure: 'Sauté diced onions until soft. Set aside.

  Take ground beef and place it in a hot pan and distribute meat evenly. Let sit for 5 minutes or until all meat is nice and brown.

  Constantly stir to make sure the meat is fully cooked. Scrape the bottom to make sure none gets stuck. Continue to do this until you get crispy brown bits.

  Add your tomato paste and stir around to combine.

  Add your ground cloves, cinnamon, allspice, cayenne pepper, ground cumin, paprika, garlic powder, and stir over medium heat.

  Add sautéed onions back to pan.

  Deglaze with ½ to 1 cup of water. Scrape bottom after adding.

  Add pinches of salt and pepper to mix in then set aside.'
