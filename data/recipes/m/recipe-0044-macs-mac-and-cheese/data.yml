babish_id: recipe-0044
name: Mac’s Mac and Cheese
image_link: null
raw_ingredient_list: '1 cup milk

  1 ½ cups water

  ½ cup panko breadcrumbs

  3-4 Tbsp butter

  8 ounces pasta of choice

  2 ounces grated Romano cheese

  4 ounces shredded American cheese

  ½ tsp dijon mustard

  4 ounces shredded sharp cheddar

  Shake of cayenne pepper'
raw_procedure: 'Combine 1 cup milk and 1 ½ cups water in a sauce pan and bring to a simmer. In a separate skillet, toast panko breadcrumbs in melted butter. Once the milk and water are simmering, add 8 ounces of a pasta of your choice.

  On medium low heat, gently cook pasta until all liquid is absorbed. Go back and forth between stirring pasta and flipping breadcrumbs.

  Once breadcrumbs are a nice golden brown, remove from heat, put in a bowl, and toss with about 2 ounces of grated Romano cheese.

  When the liquid is absorbed, put the cooked pasta on very low heat and add 4 ounces of shredded American cheese along with a heaping ½ teaspoon of dijon mustard and stir.

  Once the American cheese is melted, stir in additional 4 ounces of shredded sharp cheddar. Add a little shake of cayenne, cover, and let sit for 5 minutes.

  Stir, then put in a separate serving bowl and top with the Romano breadcrumb mixture. Enjoy!'
