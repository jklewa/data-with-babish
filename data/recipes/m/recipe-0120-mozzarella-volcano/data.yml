babish_id: recipe-0120
name: Mozzarella Volcano
image_link: null
raw_ingredient_list: 'Puff Pastry #1

  Parmesan cheese, grated

  Romano cheese, grated

  Mozzarella cheese, grated

  Egg

  Warm tomato sauce'
raw_procedure: 'Roll out your puff pastry and then cut into strips. Cover entire puff pastry with grated parmesan, romano, and mozzarella cheese.

  Beat one egg and brush the tops and bottoms of the puff pastry with the egg wash.

  Roll each strip from one end to the other forming a little volcano.

  Add volcanos to a parchment lined baking sheet and bake at 400°F for 15-20 minutes.

  Remove and let cool.

  Add some warm tomato sauce to the top so it looks more like a volcano.

  Serve and enjoy.'
