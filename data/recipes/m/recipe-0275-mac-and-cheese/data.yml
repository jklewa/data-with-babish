babish_id: recipe-0275
name: Mac and Cheese
image_link: null
raw_ingredient_list: '1 box ziti noodles

  3 Tbsp butter

  3 Tbsp flour

  3 cups of whole milk

  Dried mustard

  Hot sauce

  1 lb grated yellow cheddar cheese

  4-5 ounces of grated parmesan

  Salt

  Pepper'
raw_procedure: 'Cook 1 box of ziti noodles in a large pot. Once cooked, drain pasta and set aside.

  In the same pot whisk together 3 Tbsp flour and 3 Tbsp butter. Once combined, slowly add 3 cups of whole milk. Mix and scrape sides until everything is fully combined. Also add 1 Tbsp of ground mustard and a little bit of hot sauce.

  Add 1 pound of grated yellow cheddar cheese along with 4-5 ounces of grated parmesan cheese and mix until fully melted and combined.

  Add the pasta to the mix and stir until fully combined. Season with salt and pepper and set aside.'
