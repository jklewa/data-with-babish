description: Indiana native Jim Gaffigan arrived in New York City in 1990 at the age of 24. Officially, he had relocated to work in advertising, but his real fascination with New York had a lot more to do with pursuing his dream of making people laugh as an actor and stand-up comic, a dream he would eventually realize through hard work and ample talent. IMDb.
